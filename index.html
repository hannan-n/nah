          rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        :root {
            --paper: #f5f2e8;
            --paper-2: #ece8da;
            --paper-3: #e0dcce;
            --ink: #1a1a1a;
            --ink-soft: #6b6b5e;
            --rule: #c4bca8;
            --rule-soft: #d8d0bc;
            --case-hi: #ebe0c8;
            --case-1: #d8cab0;
            --case-2: #c8b896;
            --case-3: #b8a880;
            --case-ink: #5a4c30;
            --bezel-1: #1a1815;
            --bezel-2: #2a2620;
            --accent: #00aa44;
            --danger: #cc3333;
            --terminal-bg: #1a1a1a;
            --terminal-text: #b0ffb0;
            --mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
            --pixel: 'VT323', ui-monospace, monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: var(--mono); font-size: 14px; color: var(--ink); }
        body {
            background: radial-gradient(120% 80% at 50% 0%, #e8d8b8 0%, transparent 60%),
                radial-gradient(80% 60% at 50% 100%, #b8a888 0%, transparent 50%),
                linear-gradient(160deg, #d4c4a4 0%, #b8a888 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 16px;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.01) 0 1px, transparent 1px 3px);
            z-index: 1;
        }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 1px; }
        .mac {
            position: relative;
            width: min(760px, 100%);
            background: linear-gradient(180deg, var(--case-hi) 0%, var(--case-1) 8%, var(--case-2) 65%, var(--case-3) 100%);
            border-radius: 16px 16px 22px 22px;
            padding: 22px 22px 0;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.5), inset 0 -2px 0 rgba(0,0,0,0.15),
                inset 2px 0 0 rgba(255,255,255,0.22), inset -2px 0 0 rgba(0,0,0,0.12),
                0 30px 60px -20px rgba(60,40,20,0.4), 0 8px 20px -8px rgba(0,0,0,0.3);
            z-index: 2;
        }
        .vents { display: flex; justify-content: center; gap: 3px; padding: 2px 0 14px; }
        .vents span {
            width: 3px; height: 9px; border-radius: 1px;
            background: linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.12));
            box-shadow: inset 0 1px 0 rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.28);
        }
        .bezel {
            background: linear-gradient(180deg, var(--bezel-1) 0%, var(--bezel-2) 50%, var(--bezel-1) 100%);
            border-radius: 7px;
            padding: 13px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(255,255,255,0.04),
                0 1px 0 rgba(255,255,255,0.35);
        }
        .screen {
            background: var(--paper);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            min-height: 540px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 24px rgba(120,100,60,0.16), inset 0 0 0 1px rgba(0,0,0,0.08);
        }
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(180deg, rgba(0,0,0,0.015) 0 1px, transparent 1px 3px);
            pointer-events: none;
            z-index: 5;
        }
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(120% 90% at 50% 50%, transparent 62%, rgba(80,60,30,0.14) 100%);
            pointer-events: none;
            z-index: 5;
        }
        .crt-shutdown { animation: crtCollapse 0.07s cubic-bezier(0.4,0,1,1) forwards; }
        @keyframes crtCollapse {
            0%   { transform: scaleY(1); opacity: 1; filter: brightness(1); }
            60%  { transform: scaleY(0.05); opacity: 0; filter: brightness(0); background: #1a1a1a; }
            100% { transform: scaleY(0); opacity: 0; filter: brightness(0); background: #0a0a0a; }
        }
        .crt-startup { animation: crtExpand 0.4s ease-out forwards; }
        @keyframes crtExpand {
            0%   { transform: scaleY(0); opacity: 0; filter: brightness(0); background: #0a0a0a; }
            70%  { transform: scaleY(0.9); opacity: 0.8; filter: brightness(0.8); background: #e0d8c0; }
            100% { transform: scaleY(1); opacity: 1; filter: brightness(1); background: transparent; }
        }
        .menubar {
            height: 22px;
            background: var(--paper);
            border-bottom: 1px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-family: var(--pixel);
            font-size: 16px;
            position: relative;
            z-index: 6;
            user-select: none;
        }
        .menubar .left { display: flex; align-items: center; gap: 14px; }
        .menubar .apple { padding: 1px 4px; border-radius: 2px; cursor: default; }
        .menubar .apple:hover { background: var(--ink); color: var(--paper); }
        .menubar .apple svg { width: 12px; height: 15px; }
        .menubar .mitem { padding: 1px 4px; border-radius: 2px; cursor: default; }
        .menubar .mitem:hover { background: var(--ink); color: var(--paper); }
        .menubar .clock { font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
        .window {
            margin: 10px;
            background: var(--paper);
            border: 1px solid var(--ink);
            box-shadow: 1px 1px 0 var(--ink);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        .titlebar {
            height: 19px;
            border-bottom: 1px solid var(--ink);
            background: repeating-linear-gradient(180deg, var(--ink) 0 1px, var(--paper) 1px 3px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: var(--pixel);
            font-size: 14px;
            letter-spacing: 0.5px;
            color: var(--ink);
        }
        .titlebar .close {
            position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
            width: 11px; height: 11px; background: var(--paper); border: 1px solid var(--ink);
        }
        .title-text { background: var(--paper); padding: 0 12px; white-space: nowrap; }
        .nav {
            display: flex; flex-wrap: wrap;
            border-bottom: 1px solid var(--ink);
            background: var(--ink);
            gap: 1px;
            font-family: var(--pixel);
            font-size: 15px;
        }
        .nav a {
            background: var(--paper-2); color: var(--ink); text-decoration: none;
            padding: 4px 11px; flex: 1 1 auto; text-align: center;
            user-select: none; letter-spacing: 0.5px; line-height: 1.2;
            transition: background 80ms; cursor: pointer;
        }
        .nav a:hover, .nav a.active { background: var(--ink); color: var(--paper); }
        .body {
            padding: 22px 22px 16px; overflow: auto; flex: 1; min-height: 0;
            line-height: 1.55; font-size: 13px;
        }
        .body::-webkit-scrollbar { width: 14px; }
        .body::-webkit-scrollbar-track {
            background: repeating-linear-gradient(0deg, var(--paper-2) 0 2px, var(--paper) 2px 4px);
            border-left: 1px solid var(--ink);
        }
        .body::-webkit-scrollbar-thumb {
            background: var(--paper); border: 1px solid var(--ink);
            box-shadow: inset 1px 1px 0 var(--paper-2);
        }
        .hero {
            font-family: var(--pixel); font-size: 38px; line-height: 1;
            margin: 4px 0 6px; color: var(--ink); min-height: 40px;
            letter-spacing: 0.5px; display: flex; align-items: baseline;
        }
        .hero .typed { white-space: pre-wrap; word-break: break-word; }
        .caret {
            display: inline-block; width: 0.55ch; height: 0.9em;
            background: var(--accent); margin-left: 3px; transform: translateY(3px);
            animation: blink 1.05s steps(1) infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .tagline { font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft); letter-spacing: 0.03em; margin-bottom: 22px; }
        .feed { display: flex; flex-direction: column; border-top: 1px solid var(--rule-soft); }
        .row {
            display: grid; grid-template-columns: 100px 1fr auto;
            gap: 16px; padding: 10px 2px;
            border-bottom: 1px solid var(--rule-soft);
            align-items: baseline; color: inherit;
        }
        .row time, .row .label { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
        .row .title { font-family: var(--mono); font-size: 13px; color: var(--ink); }
        .row .tag { font-family: var(--pixel); font-size: 13px; color: var(--ink-soft); opacity: 0; transition: opacity 120ms; }
        .row:hover { background: rgba(0,0,0,0.04); }
        .row:hover .tag { opacity: 1; }
        .row.lib .label { color: var(--ink); font-family: var(--pixel); font-size: 14px; }
        .promptline {
            margin-top: 22px; padding-top: 14px;
            border-top: 1px solid var(--rule-soft);
            font-family: var(--mono); font-size: 12px; color: var(--ink-soft); line-height: 1.5;
        }
        /* ── library ───────────────────────────────────────────────── */
        .lib-category {
            margin: 18px 0 8px; font-family: var(--pixel); font-size: 16px;
            letter-spacing: 0.5px; border-left: 3px solid var(--accent);
            padding-left: 10px; color: var(--ink);
        }
        .book-entry { border-bottom: 1px solid var(--rule-soft); cursor: pointer; user-select: none; transition: background 80ms; }
        .book-entry:hover { background: rgba(0,0,0,0.03); }
        .book-title-row {
            display: grid; grid-template-columns: 1fr auto; gap: 12px;
            padding: 8px 4px; align-items: baseline;
            font-family: var(--mono); font-size: 13px; color: var(--ink);
        }
        .book-author { font-size: 11px; color: var(--ink-soft); text-align: right; }
        .book-thoughts {
            display: none; padding: 0 4px 10px 16px;
            font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
            line-height: 1.6; border-left: 2px solid var(--accent);
            margin-left: 4px; margin-bottom: 4px; font-style: italic;
        }
        .book-entry.open .book-thoughts { display: block; animation: fadeIn 0.2s ease; }
        .book-entry.open { background: rgba(0,170,68,0.04); }
        /* ── terminal sign ────────────────────────────────────────── */
        .terminal-sign {
            background: var(--terminal-bg); color: var(--terminal-text);
            padding: 16px; border: 2px solid #333;
            font-family: var(--mono); font-size: 13px; margin-top: 20px;
            border-radius: 4px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .terminal-sign h3 { color: #a0ffa0; font-family: var(--pixel); font-size: 18px; margin-bottom: 8px; }
        .terminal-prompt { display: flex; align-items: center; margin: 8px 0; }
        .terminal-prompt span { color: #80ff80; margin-right: 6px; }
        .terminal-input {
            flex: 1; background: transparent; border: none;
            color: var(--terminal-text); font-family: var(--mono); font-size: 14px;
            outline: none; caret-color: var(--accent);
        }
        .terminal-log { list-style: none; margin-top: 10px; max-height: 160px; overflow-y: auto; }
        .terminal-log li { padding: 2px 0; border-bottom: 1px solid #333; }
        /* ── floating artifact buttons (puzzle triggers) ─────────── */
        .artifact {
            position: fixed;
            z-index: 9997;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: var(--pixel);
            font-size: 22px;
            color: var(--ink);
            opacity: 0.2;
            padding: 5px 7px;
            border-radius: 2px;
            user-select: none;
            transition: opacity 0.18s ease;
            animation: artifact-flicker 6s steps(1) infinite;
        }
        /* stagger each artifact's flicker so they don't sync */
        .artifact:nth-child(1) { animation-delay: 0s;    animation-duration: 6.2s; }
        .artifact:nth-child(2) { animation-delay: 2.1s;  animation-duration: 5.7s; }
        .artifact:nth-child(3) { animation-delay: 4.4s;  animation-duration: 7.1s; }
        @keyframes artifact-flicker {
            0%,60%,80%,100% { opacity: 0.2; }
            68%  { opacity: 0.04; }
            74%  { opacity: 0.45; }
            83%  { opacity: 0.08; }
        }
        .artifact:hover, .artifact:focus-visible {
            opacity: 0.85;
            color: #b87820;   /* amber — distinct from green glitch */
            animation: artifact-shake 100ms steps(2) infinite;
        }
        @keyframes artifact-shake {
            0%,100% { transform: translate(0,0); }
            33%     { transform: translate(1px,-1px); }
            66%     { transform: translate(-1px,1px); }
        }
        .artifact.vanishing {
            animation: pixel-collapse 0.5s ease-in forwards;
            pointer-events: none;
        }
        /* ── modal input / button ─────────────────────────────────── */
        .puzzle-modal-input {
            width: 100%; font-family: var(--mono); font-size: 14px;
            padding: 5px 8px; border: 1px solid var(--ink);
            margin: 8px 0; background: #fffef9; outline: none;
        }
        .puzzle-modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .puzzle-modal-btn {
            font-family: var(--pixel); background: var(--ink); color: var(--paper);
            border: none; padding: 4px 14px; cursor: pointer; font-size: 14px;
            letter-spacing: 0.5px;
        }
        .puzzle-modal-btn:hover { background: var(--accent); color: var(--ink); }
        /* ── modal ────────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 9999; display: none; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--paper); border: 2px solid var(--ink);
            box-shadow: 4px 4px 0 var(--ink), 0 20px 40px rgba(0,0,0,0.4);
            padding: 20px 24px; max-width: 380px; width: 90%;
            font-family: var(--mono); font-size: 13px; position: relative;
            animation: fadeIn 0.15s ease;
        }
        .modal-close { position: absolute; top: 4px; right: 8px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink); font-family: var(--pixel); }
        /* ── glitch button ────────────────────────────────────────── */
        .glitch {
            position: fixed; z-index: 9998; background: transparent; border: none;
            cursor: pointer; font-family: var(--pixel); font-size: 18px; color: var(--ink);
            opacity: 0.35; padding: 6px 8px; border-radius: 2px;
            transition: opacity 0.2s ease, left 1.4s cubic-bezier(0.4,0.05,0.2,1), top 1.4s cubic-bezier(0.4,0.05,0.2,1);
            user-select: none;
            animation: glitch-flicker 8s steps(1) infinite;
        }
        @keyframes glitch-flicker {
            0%,92%,94%,96%,100% { opacity: 0.35; }
            93% { opacity: 0.08; }
            95% { opacity: 0.6; }
            97% { opacity: 0.15; }
        }
        .glitch:hover, .glitch:focus-visible { opacity: 1; color: var(--accent); animation: shake 90ms steps(2) infinite; }
        @keyframes shake {
            0%,100% { transform: translate(0,0); }
            25% { transform: translate(-1.5px,-1px); }
            50% { transform: translate(1.5px,1.5px); }
            75% { transform: translate(-1px,1.5px); }
        }
        .glitch.vanishing { animation: pixel-collapse 0.5s ease-in forwards; pointer-events: none; }
        @keyframes pixel-collapse {
            0%  { transform: scale(1); opacity: 1; filter: brightness(1); }
            60% { transform: scale(0.3); opacity: 0.4; filter: brightness(3); color: var(--accent); }
            100%{ transform: scale(0); opacity: 0; filter: brightness(0); color: var(--accent); }
        }
        /* ── statusbar / chin ─────────────────────────────────────── */
        .statusbar {
            height: 18px; border-top: 1px solid var(--ink); background: var(--paper-2);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; font-family: var(--pixel); font-size: 13px; color: var(--ink-soft);
        }
        .chin {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 4px 18px; color: var(--case-ink);
            font-family: var(--pixel); font-size: 15px; letter-spacing: 1.2px;
        }
        .chin .label { font-style: italic; text-shadow: 0 1px 0 rgba(255,255,255,0.4); }
        .floppy {
            width: 46px; height: 12px;
            background: linear-gradient(180deg, var(--bezel-2), var(--bezel-1));
            border: 1px solid #4a4540; border-radius: 1px; position: relative;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.5);
        }
        .floppy::before {
            content: ''; position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 2px; background: #0a0a0a; border-radius: 1px;
        }
        /* ── drag overlay ─────────────────────────────────────────── */
        .drag-overlay {
            position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: var(--pixel); font-size: 24px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .drag-overlay.show { opacity: 1; }
        /* ── pages ────────────────────────────────────────────────── */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .h-card-hidden { display: none; }
        ::selection { background: var(--ink); color: var(--paper); }
        /* ── puzzle terminal ──────────────────────────────────────── */
        .terminal-puzzle {
            background: var(--terminal-bg); color: var(--terminal-text);
            padding: 16px; border: 2px solid #333;
            font-family: var(--mono); font-size: 13px;
            margin-top: 8px; border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .terminal-puzzle h3 { color: #a0ffa0; font-family: var(--pixel); font-size: 18px; margin-bottom: 10px; letter-spacing: 0.5px; }
        .lede { font-size: 11.5px; color: #70a070; line-height: 1.65; margin-bottom: 14px; }
        .puzzle-math {
            font-family: var(--mono); font-size: 12px; color: #608060;
            background: rgba(0,0,0,0.35); padding: 8px 12px; margin: 10px 0;
            border-left: 2px solid #2a5a2a; white-space: pre;
            letter-spacing: 0.04em; line-height: 1.5;
        }
        .matrix-stage {
            width: 100%; height: 220px; display: block; margin: 10px 0;
            border: 1px solid #2a2a2a; border-radius: 2px; background: #111;
        }
        .puzzle-readout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px;
            margin: 10px 0; padding: 8px 0;
            border-top: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a;
        }
        .k { color: #507050; font-size: 11px; font-family: var(--mono); letter-spacing: 0.03em; }
        .v { color: var(--terminal-text); font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; }
        .highlight { color: var(--accent) !important; }
        .warning   { color: var(--danger)  !important; }
        .puzzle-input-group { display: flex; align-items: center; gap: 8px; margin: 12px 0 6px; flex-wrap: wrap; }
        .puzzle-input-group label { color: #70a070; font-family: var(--mono); font-size: 12px; min-width: 10px; }
        .matrix-input {
            width: 54px; background: #0a0a0a; border: 1px solid #3a3a3a;
            color: var(--terminal-text); font-family: var(--mono); font-size: 13px;
            padding: 3px 6px; text-align: center; -moz-appearance: textfield;
        }
        .matrix-input::-webkit-inner-spin-button, .matrix-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .matrix-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .kbd-hints { display: flex; gap: 14px; flex-wrap: wrap; font-size: 10.5px; color: #3a5a3a; margin: 4px 0 10px; user-select: none; }
        .kbd-hints kbd { background: #111; border: 1px solid #333; border-radius: 2px; padding: 0 4px; font-family: var(--mono); font-size: 10px; color: #609060; }
        .btn {
            font-family: var(--pixel); background: #111; color: #609060;
            border: 1px solid #3a3a3a; padding: 3px 12px; cursor: pointer;
            font-size: 13px; letter-spacing: 0.5px;
            transition: background 80ms, color 80ms, border-color 80ms;
        }
        .btn:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .puzzle-reward {

        function safeGet(k, fb)   { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch(e) { return fb; } }
        function safeSet(k, v)    { try { localStorage.setItem(k, v); } catch(e) {} }

        function safeSetJSON(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

        const PUZZLE_KEY  = 'nah_hannan_puzzle_solved';

                svdResizeObserver = new ResizeObserver(() => {
                    if (svdRedrawPending) cancelAnimationFrame(svdRedrawPending);

            }

        // ── DATA: notes ───────────────────────────────────────────────
        const notesEntries = [
            ['2026-05-01', 'spent three hours on a bug. it was a shape mismatch. the error message said so. i had been scrolling past it', 'code'],

            ['2025-07-15', 'variance is not risk. this comes up constantly in the sovereign credit work', 'finance'],

        ];

        // ── DATA: essays ──────────────────────────────────────────────
        const essayEntries = [
            ['2026-05-01', 'why i keep going back to the SVD', 'math'],
            ['2026-04-12', 'what building the DCF taught me about my assumptions', 'finance'],
            ['2026-03-18', 'the part of backprop no one explained to me properly', 'ml'],
            ['2026-02-05', 'argentina: what the numbers were actually saying', 'finance'],
            ['2025-12-20', 'what shifted when i read jaynes', 'stats'],
            ['2025-10-08', 'stationarity in practice is messier than the textbooks suggest', 'stats'],

        // ── DATA: research ────────────────────────────────────────────
        const researchEntries = [
            ['2026-05-01', 'bounds on predictability in bayesian deep learning — working through the cramer-rao floor argument', 'wip'],
            ['2026-04-15', 'argentina sovereign credit — tail scenarios and refinancing risk for the fund', 'ongoing'],

        // ── DATA: tinkering ───────────────────────────────────────────
        const tinkerEntries = [
            ['vis',     'interactive SVD explorer — singular values, rank, condition number, unit circle transform in real time', 'done'],
            ['code',    'reverse-mode autodiff in ~300 lines of python — topological sort over a DAG of scalar ops', 'done'],

            ['audio',   'fourier analysis of piano overtones in the browser using the web audio api', 'wip'],
            ['sim',     'n-body gravity with barnes-hut tree approximation, three.js', 'wip'],
        ];

        // ── DATA: books ───────────────────────────────────────────────
        const books = [
            { title: 'Probability Theory: The Logic of Science', author: 'E.T. Jaynes', cat: 'Probability & Statistics', thoughts: 'Changed how I think about what probability actually means. Probability as a measure of uncertainty rather than a frequency of events. Still working through the later chapters.' },
            { title: 'Bayesian Data Analysis', author: 'Gelman et al.', cat: 'Probability & Statistics', thoughts: 'The book I open when I need to actually compute something. Jaynes gave me the framing; this gives me the tools.' },
            { title: 'Statistical Rethinking', author: 'Richard McElreath', cat: 'Probability & Statistics', thoughts: 'The most readable stats book I have found. The causal diagrams chapter changed how I set up problems.' },
            { title: 'All of Statistics', author: 'Larry Wasserman', cat: 'Probability & Statistics', thoughts: 'Dense. Better as a second book than a first.' },
            { title: 'Statistical Inference', author: 'Casella & Berger', cat: 'Probability & Statistics', thoughts: 'Standard grad text. The sufficiency chapters are the ones I go back to.' },
            { title: 'Elements of Information Theory', author: 'Cover & Thomas', cat: 'Probability & Statistics', thoughts: 'Where probability and computation start sharing vocabulary. Most of ML is downstream of these ideas.' },
            { title: 'Probability with Martingales', author: 'David Williams', cat: 'Probability & Statistics', thoughts: 'Short and precise. The footnotes are worth reading.' },
            { title: 'Linear Algebra and Its Applications', author: 'Gilbert Strang', cat: 'Mathematics', thoughts: 'Strang teaches it as geometry first. The SVD chapters are the reason the little interactive thing at the bottom of this site exists.' },
            { title: 'Linear Algebra Done Right', author: 'Sheldon Axler', cat: 'Mathematics', thoughts: 'Determinants get pushed to the last chapter. By the time you get there you understand why.' },
            { title: 'Principles of Mathematical Analysis', author: 'Walter Rudin', cat: 'Mathematics', thoughts: 'You work through it slowly rather than read it. A lot of analysis clicked afterwards.' },
            { title: 'Numerical Linear Algebra', author: 'Trefethen & Bau', cat: 'Mathematics', thoughts: 'Short, careful, good intuitions about conditioning. I go back to the SVD chapters fairly often.' },
            { title: 'Convex Optimization', author: 'Boyd & Vandenberghe', cat: 'Mathematics', thoughts: 'Useful for spotting when a problem is secretly convex. That is more often than you think.' },
            { title: 'Pattern Recognition and Machine Learning', author: 'Christopher Bishop', cat: 'Machine Learning', thoughts: 'The Bayesian-leaning ML text. Graphical models and variational inference chapters still hold up.' },
            { title: 'The Elements of Statistical Learning', author: 'Hastie, Tibshirani, Friedman', cat: 'Machine Learning', thoughts: 'Better as a second book. More useful after you have actually built a few models.' },
            { title: 'Reinforcement Learning: An Introduction', author: 'Sutton & Barto', cat: 'Machine Learning', thoughts: 'They have been refining this since 1998 and you can feel it. The TD-learning chapters are the ones I re-read.' },
            { title: 'Gaussian Processes for Machine Learning', author: 'Rasmussen & Williams', cat: 'Machine Learning', thoughts: 'The GP book. Elegant and practical. The covariance function chapters are quietly excellent.' },
            { title: 'Understanding Deep Learning', author: 'Simon Prince', cat: 'Machine Learning', thoughts: 'A 2023 book that already feels like the right one to start with. Probabilistic eye throughout.' },
            { title: 'Options, Futures, and Other Derivatives', author: 'John C. Hull', cat: 'Finance', thoughts: 'The standard reference. Methodical. Does not oversimplify.' },
            { title: 'Stochastic Calculus for Finance', author: 'Steven Shreve', cat: 'Finance', thoughts: 'Two volumes. The discrete-time first volume is the one to start with.' },
            { title: 'The Black Swan', author: 'Nassim Nicholas Taleb', cat: 'Finance', thoughts: 'The core point — rare events do most of the work — matters more than the presentation sometimes suggests.' },
            { title: 'Antifragile', author: 'Nassim Nicholas Taleb', cat: 'Finance', thoughts: 'Some systems get stronger under volatility. Useful framing even when you set the rest aside.' },
            { title: 'Against the Gods', author: 'Peter Bernstein', cat: 'Finance', thoughts: 'A history of how we learned to quantify uncertainty. Pascal through Markowitz, told as a story.' },
            { title: 'The Signal and the Noise', author: 'Nate Silver', cat: 'Finance', thoughts: 'The case studies are where the Bayesian thinking actually shows up. More useful than the frame suggests.' },
            { title: 'Thinking in Systems', author: 'Donella Meadows', cat: 'Systems', thoughts: 'The clearest short book about why well-intentioned fixes often do not work.' },
            { title: 'The Mythical Man-Month', author: 'Fred Brooks', cat: 'Systems', thoughts: 'Written in 1975 about OS/360 and still basically accurate about software.' },
            { title: 'Designing Data-Intensive Applications', author: 'Martin Kleppmann', cat: 'Systems', thoughts: 'Most database choices are consistency-versus-availability choices in disguise.' },
            { title: 'Structure and Interpretation of Computer Programs', author: 'Abelson & Sussman', cat: 'Software', thoughts: 'Computer science as managing complexity through abstraction.' },
            { title: 'The Pragmatic Programmer', author: 'Hunt & Thomas', cat: 'Software', thoughts: 'Two decades of software lessons. The broken windows metaphor has stuck.' },
            { title: 'A Geometry of Music', author: 'Dmitri Tymoczko', cat: 'Music & Maths', thoughts: 'Chords as points in geometric spaces, voice leading as motion between them. Once it clicks you cannot unsee it.' },
            { title: 'The Structure of Scientific Revolutions', author: 'Thomas Kuhn', cat: 'Philosophy', thoughts: 'Kuhn gave us "paradigm shift" and then spent years explaining that people had taken it wrong. Both halves are interesting.' },
            { title: 'Gödel, Escher, Bach', author: 'Douglas Hofstadter', cat: 'Philosophy', thoughts: 'Self-reference and strange loops. I have read it twice and got something different each time.' },
            { title: 'The Beginning of Infinity', author: 'David Deutsch', cat: 'Philosophy', thoughts: 'Good explanations are creative and hard to vary. I do not buy all of it but the parts I do run deep.' },
        ];

        // ── page definitions ──────────────────────────────────────────
        const pages = {
            notes:    { label: '.notes',    winTitle: 'nah.hannan — notes',     words: ['notes', 'things i noticed', 'half-thoughts'],      entries: notesEntries,  prompt: 'msc finance at ucc. building things to understand them. notes from the process.' },
            research: { label: 'research',  winTitle: 'nah.hannan — research',  words: ['research', 'fund work', 'live projects'],           entries: researchEntries, prompt: 'current: equity analyst and credit analyst at the ucc student managed fund. independent work on the side.' },
            essays:   { label: 'essays',    winTitle: 'nah.hannan — essays',    words: ['essays', 'longer reads', 'when a note wasn\'t enough'], entries: essayEntries, prompt: 'longer pieces when a note did not quite fit. mostly stats and finance.' },
            library:  { label: 'library',   winTitle: 'nah.hannan — library',   words: ['library', 'books', 'reading list'],                 entries: [],            prompt: 'books i have read and have something to say about. click to expand.' },
            tinkering:{ label: 'tinkering', winTitle: 'nah.hannan — tinkering', words: ['tinkering', 'small builds', 'projects'],            entries: tinkerEntries, prompt: 'things i built to understand how they work. some finished, some not.' },
            sign:     { label: 'sign',      winTitle: 'nah.hannan — sign',      words: ['sign', 'leave something', 'equations welcome'],     entries: [],            prompt: 'leave an equation if you like.' },
            puzzle:   { label: '▒',         winTitle: 'nah.hannan — singular',  words: ['singular', 'σ₂ = 0', 'rank collapse'],             entries: [],            prompt: 'drag σ₂ to zero.' },
        };

        const navOrder = ['notes','research','essays','library','tinkering','sign'];
        const nav = $('nav'), typedEl = $('typed'), winTitle = $('winTitle'),
              statusLeft = $('statusLeft'), statusRight = $('statusRight'),
              clockEl = $('clock'), bodyEl = $('body'), crtScreen = $('crtScreen');

        navOrder.forEach(key => {

        // ── audio ─────────────────────────────────────────────────────
        let audioCtx;
        function playCrtPop() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime, gain = audioCtx.createGain();
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
                const osc = audioCtx.createOscillator();
                osc.connect(gain); osc.frequency.value = 100;
                osc.start(); osc.stop(now + 0.07);
            } catch(e) {}
        }

        // ── typewriter ────────────────────────────────────────────────
        let typeTimer, currentWords = [], wordIdx = 0, charIdx = 0, deleting = false;
        function startTypewriter(words) {
            if (!words || !typedEl) return;
            clearTimeout(typeTimer);
            currentWords = words; wordIdx = charIdx = 0; deleting = false;
            typedEl.textContent = '';
            function step() {
                if (!typedEl) return;
                const t = currentWords[wordIdx];
                if (!t) return;
                if (!deleting) {
                    if (charIdx < t.length) { charIdx++; typedEl.textContent = t.slice(0, charIdx); typeTimer = setTimeout(step, 80 + Math.random() * 40); }
                    else { deleting = true; typeTimer = setTimeout(step, 1800); }
                } else {
                    if (charIdx > 0) { charIdx--; typedEl.textContent = t.slice(0, charIdx); typeTimer = setTimeout(step, 40 + Math.random() * 20); }
                    else { deleting = false; wordIdx = (wordIdx + 1) % currentWords.length; typeTimer = setTimeout(step, 300); }
                }
            }
            step();
        }

        // ── SVD maths ─────────────────────────────────────────────────
        function svd(a, b, c, d) {
            const ATA11 = a*a+c*c, ATA12 = a*b+c*d, ATA22 = b*b+d*d;
            const trace = ATA11+ATA22, detA = ATA11*ATA22 - ATA12*ATA12;
            const disc = Math.sqrt(Math.max(0, trace*trace/4 - detA));
            return { sigma1: Math.sqrt(Math.max(0, trace/2+disc)), sigma2: Math.sqrt(Math.max(0, trace/2-disc)) };
        }
        function drawSVD(ctx, w, h, a, b, c, d, isSingular) {
            const cx = w/2, cy = h/2, s = Math.min(w,h)*0.30;
            ctx.fillStyle = '#111111'; ctx.fillRect(0,0,w,h);
            ctx.beginPath(); ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 0.5;
            for (let x = cx%s; x<=w; x+=s) { ctx.moveTo(x,0); ctx.lineTo(x,h); }
            for (let y = cy%s; y<=h; y+=s) { ctx.moveTo(0,y); ctx.lineTo(w,y); }
            ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = '#2e3e2e'; ctx.lineWidth = 1;
            ctx.moveTo(0,cy); ctx.lineTo(w,cy); ctx.moveTo(cx,0); ctx.lineTo(cx,h); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = '#2a4a6a'; ctx.lineWidth = 1;
            for (let t=0; t<=Math.PI*2+0.01; t+=0.02) {
                const x=cx+Math.cos(t)*s, y=cy-Math.sin(t)*s;
                t<0.01 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.closePath(); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = isSingular ? '#aa3322' : '#b87840'; ctx.lineWidth = 2;
            for (let t=0; t<=Math.PI*2+0.01; t+=0.02) {
                const x0=Math.cos(t), y0=Math.sin(t);
                const x1=a*x0+b*y0, y1=c*x0+d*y0;
                const x=cx+x1*s, y=cy-y1*s;
                t<0.01 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.closePath(); ctx.stroke();
            const drawArrow = (tx,ty) => {
                const angle=Math.atan2(ty-cy,tx-cx), L=7;
                ctx.moveTo(tx,ty); ctx.lineTo(tx-L*Math.cos(angle-0.38),ty-L*Math.sin(angle-0.38));
                ctx.moveTo(tx,ty); ctx.lineTo(tx-L*Math.cos(angle+0.38),ty-L*Math.sin(angle+0.38));
            };
            ctx.beginPath(); ctx.strokeStyle = '#00aa44'; ctx.lineWidth = 1.5;
            ctx.moveTo(cx,cy); ctx.lineTo(cx+a*s,cy-c*s);
            ctx.moveTo(cx,cy); ctx.lineTo(cx+b*s,cy-d*s);
            drawArrow(cx+a*s,cy-c*s); drawArrow(cx+b*s,cy-d*s); ctx.stroke();
            if (isSingular) {
                ctx.save(); ctx.setLineDash([3,5]);
                ctx.beginPath(); ctx.strokeStyle='rgba(170,51,34,0.22)'; ctx.lineWidth=1;
                ctx.moveTo(0,cy); ctx.lineTo(w,cy); ctx.stroke(); ctx.restore();
            }
            ctx.beginPath(); ctx.fillStyle = isSingular ? '#aa3322' : '#409040';
            ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
        }
        function updateSVD() {
            const a=+$('svdA').value||0, b=+$('svdB').value||0,
                  c=+$('svdC').value||0, d=+$('svdD').value||0;
            const {sigma1,sigma2} = svd(a,b,c,d);
            const isZero = !a&&!b&&!c&&!d;
            const rank = isZero ? 0 : (Math.abs(sigma2)<1e-6 ? 1 : 2);
            const isSingular = rank<2 && !isZero;
            $('svdMatrixStr').innerHTML  = `⎡ ${a.toFixed(2)}  ${b.toFixed(2)} ⎤<br>⎣ ${c.toFixed(2)}  ${d.toFixed(2)} ⎦`;
            $('svdSingularStr').innerHTML = `σ₁ = ${sigma1.toFixed(3)}, σ₂ = ${sigma2.toFixed(3)}`;
            $('svdCondStr').innerHTML    = sigma2<1e-6 ? '∞' : (sigma1/sigma2).toFixed(3);
            $('svdRankStr').innerHTML    = rank===0 ? '0 (zero matrix)' : rank===1 ? '1 (dimension lost)' : '2 (full)';
            $('svdRecoverStr').innerHTML = isSingular ? 'FALSE' : 'TRUE';
            $('svdRecoverStr').classList.toggle('warning',   isSingular);
            $('svdRecoverStr').classList.toggle('highlight', !isSingular);
            const rewardEl = $('puzzleReward');
            if (isSingular && rewardEl) {
                rewardEl.style.display = 'block';
                rewardEl.innerHTML = `> DETERMINANT ZERO. a dimension is gone.<br>> information cannot be reconstructed. welcome to the left nullspace.<br>
        <a href="https://xkcd.com/184/" target="_blank" rel="noopener noreferrer" style="display:block;margin:12px 0;text-align:center;background:rgba(0,0,0,0.3);padding:8px;border:1px solid #2a5a2a;border-radius:2px;">
          <img src="https://imgs.xkcd.com/comics/matrix_transform.png" alt="xkcd 184: Matrix Transform" style="max-width:100%;height:auto;opacity:0.85;" loading="lazy" referrerpolicy="no-referrer" crossorigin="anonymous">
        </a>
        <div style="font-style:italic;margin-top:8px;color:#80c080;">Rotation preserves area. The transpose is the inverse. Singular matrices live in the gap where that stops being true.<br>Kurzweil predicted the Singularity by 2045. This one arrives when σ₂ = 0.</div>
        <div style="font-size:11px;text-align:center;margin-top:10px;color:#507050;">> [ ▒ permanently deleted from the DOM ]</div>`;
                markPuzzleSolved();
            } else if (rewardEl) { rewardEl.style.display = 'none'; }
            const canvas = $('svdCanvas');
            if (!canvas) return;
            const w=canvas.clientWidth, h=canvas.clientHeight;
            if (w===0||h===0) return;
            const dpr=window.devicePixelRatio||1;
            canvas.width=w*dpr; canvas.height=h*dpr;
            const ctx=canvas.getContext('2d');
            ctx.setTransform(dpr,0,0,dpr,0,0);
            drawSVD(ctx,w,h,a,b,c,d,isSingular);
        }
        function setupField(id) {
            const inp=$(id);
            if (!inp) return;
            inp.addEventListener('input', updateSVD);
            inp.addEventListener('keydown', e => {
                const step = e.shiftKey ? 0.1 : 1;
                if (e.key==='ArrowUp')   { e.preventDefault(); inp.value=((+inp.value)+step).toFixed(e.shiftKey?1:0); updateSVD(); }
                else if (e.key==='ArrowDown') { e.preventDefault(); inp.value=((+inp.value)-step).toFixed(e.shiftKey?1:0); updateSVD(); }
                else if (e.key==='r'&&!e.ctrlKey&&!e.metaKey) { e.preventDefault(); $('svdA').value=1;$('svdB').value=0;$('svdC').value=0;$('svdD').value=1; updateSVD(); }
            });
        }

        // ── render puzzle page ────────────────────────────────────────
        function renderPuzzle() {
            const el = $('page-puzzle');
            if (!el) return;
            el.innerHTML = `<div class="terminal-puzzle">
        <h3>SVD · dimensional collapse</h3>
        <div class="lede">every 2×2 matrix <b>A</b> stretches or squashes the plane along two principal directions. the singular values σ₁ and σ₂ measure how much. when σ₂ hits zero the matrix folds the plane onto a line — a move it cannot undo.</div>
        <div class="puzzle-math">A = UΣVᵀ   where   Σ = ⎡ σ₁  0 ⎤
                              ⎣  0 σ₂ ⎦</div>
        <canvas class="matrix-stage" id="svdCanvas"></canvas>
        <div class="puzzle-readout">
          <div><span class="k">matrix A</span></div><div class="v" id="svdMatrixStr">⎡ 2.00  0 ⎤<br>⎣ 0  1.00 ⎦</div>
          <div><span class="k">singular values</span></div><div class="v" id="svdSingularStr">σ₁ = 2.000, σ₂ = 1.000</div>
          <div><span class="k">condition number</span></div><div class="v" id="svdCondStr">2.000</div>
          <div><span class="k">rank</span></div><div class="v" id="svdRankStr">2 (full)</div>
          <div><span class="k">invertible</span></div><div class="v highlight" id="svdRecoverStr">TRUE</div>
        </div>
        <div class="puzzle-input-group">
          <label for="svdA">a</label><input type="number" id="svdA" class="matrix-input" step="1" value="2" autocomplete="off" aria-label="Matrix a">
          <label for="svdB">b</label><input type="number" id="svdB" class="matrix-input" step="1" value="0" autocomplete="off" aria-label="Matrix b">
          <label for="svdC">c</label><input type="number" id="svdC" class="matrix-input" step="1" value="0" autocomplete="off" aria-label="Matrix c">
          <label for="svdD">d</label><input type="number" id="svdD" class="matrix-input" step="1" value="1" autocomplete="off" aria-label="Matrix d">
          <button class="btn" id="svdReset">identity</button>
        </div>
        <div class="kbd-hints"><span><kbd>Tab</kbd> next field</span><span><kbd>↑↓</kbd> ±1</span><span><kbd>Shift</kbd>+<kbd>↑↓</kbd> ±0.1</span><span><kbd>r</kbd> reset</span></div>
        <div id="puzzleReward" class="puzzle-reward"></div>
        <div class="puzzle-math">goal: make σ₂ = 0. watch the ellipse collapse to a line.</div>
      </div>`;
            ['svdA','svdB','svdC','svdD'].forEach(setupField);
            $('svdReset').addEventListener('click', () => {
                $('svdA').value=1;$('svdB').value=0;$('svdC').value=0;$('svdD').value=1; updateSVD();
            });
            updateSVD();
            const canvas = $('svdCanvas');
            if (canvas) { disconnectObserver(); ensureObserver(canvas); }
        }

        // ── inline challenge boxes (visible, not hidden dots) ─────────
        const challenges = {
            prob: {
                id: 'prob',
                tag: 'probability',
                q: 'flip two fair coins. i tell you at least one landed heads.\nwhat is the probability both are heads?',
                hint: 'enter as a fraction, e.g. 1/4',
                answer: '1/3',
            },
            eigen: {
                id: 'eigen',
                tag: 'linear algebra',
                q: 'find the eigenvalues of  A = [[2, 1], [1, 2]].',
                hint: 'two values, comma-separated, e.g. 1,3',
                answer: '1,3',
            },
            grad: {
                id: 'grad',
                tag: 'optimisation',
                q: 'f(x) = x².  start at x = 2,  learning rate η = 0.25.\nwhat is x after one gradient descent step?',
                hint: 'f\'(x) = 2x',
                answer: '1',
            },
        };

        // ── floating artifact puzzle triggers ─────────────────────────
        // Three fixed-position buttons on the viewport, like the glitch
        // but stationary, amber on hover, different block characters.
        // Clicking opens a modal challenge; solving collapses them out.
        const artifactDefs = [
            { id: 'prob',  sym: '░', ch: challenges.prob,  bottom: '24%', left:  '1.6%' },
            { id: 'eigen', sym: '▓', ch: challenges.eigen, top:    '26%', right: '1.4%' },
            { id: 'grad',  sym: '▪', ch: challenges.grad,  top:    '60%', left:  '1.2%' },
        ];

        function openChallengeModal(def) {
            const modal = $('puzzleModal'), body = $('modalBody');
            body.innerHTML = `
                <p style="font-family:var(--pixel);font-size:17px;letter-spacing:0.5px;margin-bottom:10px;">${esc(def.ch.tag)}</p>
                <p style="line-height:1.65;margin-bottom:12px;">${esc(def.ch.q).replace(/\n/g,'<br>')}</p>
                <input type="text" id="challInput" class="puzzle-modal-input"
                       placeholder="${esc(def.ch.hint)}" autocomplete="off" spellcheck="false" aria-label="answer">
                <div style="display:flex;align-items:center;gap:10px;margin-top:2px;">
                  <button id="challSubmit" class="puzzle-modal-btn">submit</button>
                  <span style="font-size:11px;color:var(--ink-soft);">${esc(def.ch.hint)}</span>
                </div>
                <div id="challFb" style="margin-top:8px;font-size:12px;min-height:16px;"></div>`;
            modal.classList.add('active');
            const inp = $('challInput'), fb = $('challFb');
            setTimeout(() => inp && inp.focus(), 50);
            const normalise = s => s.split(',').map(v => v.trim()).sort().join(',');
            const attempt = () => {
                if (!inp) return;
                const ans = normalise(inp.value.trim().toLowerCase());
                if (ans === normalise(def.ch.answer)) {
                    fb.style.color = 'var(--accent)'; fb.textContent = '✓ correct.';
                    markChallengeSolved(def.id);
                    const btn = $('artifact-' + def.id);
                    if (btn) {
                        btn.classList.add('vanishing');
                        btn.addEventListener('animationend', () => btn.remove(), { once: true });
                    }
                    setTimeout(closeModal, 700);
                } else {
                    fb.style.color = 'var(--danger)'; fb.textContent = '✗ not quite.';
                    inp.select();
                }
            };
            $('challSubmit').addEventListener('click', attempt);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
        }

        function renderFloatingArtifacts() {
            artifactDefs.forEach(def => {
                if (challengesSolved[def.id]) return; // already solved
                const btn = document.createElement('button');
                btn.className = 'artifact';
                btn.id = 'artifact-' + def.id;
                btn.textContent = def.sym;
                btn.setAttribute('aria-label', 'puzzle artifact');
                // apply whichever positional props are defined
                ['top','bottom','left','right'].forEach(p => { if (def[p]) btn.style[p] = def[p]; });
                btn.addEventListener('click', () => openChallengeModal(def));
                document.body.appendChild(btn);
            });
        }

        // ── library ───────────────────────────────────────────────────
        function renderLibrary() {
            const el = $('page-library');
            if (!el) return;
            const cats = [...new Set(books.map(b=>b.cat))];
            let html = '';
            cats.forEach(cat => {
                html += `<div class="lib-category">${esc(cat)}</div>`;
                books.filter(b=>b.cat===cat).forEach(b =>
                    html += `<div class="book-entry"><div class="book-title-row"><span>${esc(b.title)}</span><span class="book-author">${esc(b.author)}</span></div><div class="book-thoughts">${esc(b.thoughts)}</div></div>`
                );
            });
            el.innerHTML = html + `<p class="promptline">${esc(pages.library.prompt)}</p>`;
            el.addEventListener('click', e => {
                const entry = e.target.closest('.book-entry');
                if (!entry) return;
                entry.classList.toggle('open');
            });
        }

        function renderList(key) {
            const data = pages[key];
            const el = $('page-' + key);
            if (!el || !data.entries.length) return;
            const isLabel = key === 'tinkering';
            const rows = data.entries.map(([date, title, tag]) => {
                const cell = isLabel
                    ? `<span class="label">${esc(date)}</span>`
                    : `<time datetime="${esc(date)}">${esc(date)}</time>`;
                return `<div class="row${isLabel?' lib':''}"> ${cell}<span class="title">${esc(title)}</span><span class="tag">[${esc(tag)}]</span></div>`;
            }).join('');
            el.innerHTML = `<div class="feed">${rows}</div><p class="promptline">${esc(data.prompt)}</p>`;
        }

        // ── sign terminal ─────────────────────────────────────────────
        const SECRET_CMDS = {
            'det(a)=0'         : '> det(A) = 0. the null space opens.',
            'det(a) = 0'       : '> det(A) = 0. the null space opens.',
            'σ₁·σ₂=|det(a)|'  : '> σ₁ · σ₂ = |det(A)|. you read the source.',
            'σ₁·σ₂ = |det(a)|': '> σ₁ · σ₂ = |det(A)|. you read the source.',
            'source'           : '> reading the source counts.',
            'e^(iπ)+1=0'       : '> euler. yes.',
            'e^(iπ) + 1 = 0'   : '> euler. yes.',
        };
        function renderSign() {
            const el = $('page-sign');
            if (!el) return;
            const equations = safeGetJSON(SIGN_KEY, []);
            const log = equations.map(e => `<li>> ${esc(e)}</li>`).join('');
            el.innerHTML = `<div class="terminal-sign"><h3>sign in space</h3>
        <div class="terminal-prompt"><span>></span><input id="termInput" class="terminal-input" placeholder="enter an equation..." aria-label="Enter equation" autocomplete="off" spellcheck="false"></div>
        <ul class="terminal-log" id="termLog">${log}</ul></div>
        <p class="promptline">${esc(pages.sign.prompt)}</p>`;
            const input=$('termInput'), logEl=$('termLog');
            logEl.scrollTop = logEl.scrollHeight;
            input.addEventListener('keydown', e => {
                if (e.key !== 'Enter') return;
                const val = input.value.trim();
                if (!val) return;
                input.value = '';
                const cmd = val.toLowerCase();
                if (SECRET_CMDS[cmd]) {
                    const li = document.createElement('li');
                    li.textContent = SECRET_CMDS[cmd];
                    li.style.color = '#a0ffa0';
                    logEl.appendChild(li);
                    logEl.scrollTop = logEl.scrollHeight;
                    if (!sourcePuzzleSolved) { sourcePuzzleSolved=true; safeSet(SOURCE_KEY,'true'); }
                    return;
                }
                equations.push(val);
                safeSetJSON(SIGN_KEY, equations);
                const li = document.createElement('li');
                li.textContent = '> ' + val;
                logEl.appendChild(li);
                logEl.scrollTop = logEl.scrollHeight;
            });
            setTimeout(() => input.focus(), 100);
        }

        // ── initial render ────────────────────────────────────────────
        navOrder.forEach(key => {
            if (key === 'library') renderLibrary();
            else if (key === 'sign') renderSign();
            else if (key !== 'puzzle') renderList(key);
        });
        renderPuzzle();
        renderFloatingArtifacts();

        // ── modal ─────────────────────────────────────────────────────
        function closeModal() { $('puzzleModal').classList.remove('active'); }
        $('modalClose').addEventListener('click', closeModal);
        $('puzzleModal').addEventListener('click', e => { if (e.target===$('puzzleModal')) closeModal(); });
        document.addEventListener('keydown', e => {
            if (e.key==='Escape' && $('puzzleModal').classList.contains('active')) closeModal();
        });

        // ── transitions ───────────────────────────────────────────────
        let isTransitioning = false, currentKey = null;
        function swapPageContent(key, fromNav) {
            if (!pages[key]) key = 'notes';
            if (key===currentKey && !fromNav) return;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const ap = $('page-' + key);
            if (ap) ap.classList.add('active');
            nav.querySelectorAll('a').forEach(a => {
                const m = a.dataset.page === key;
                a.classList.toggle('active', m);
                m ? a.setAttribute('aria-current','page') : a.removeAttribute('aria-current');
            });
            winTitle.textContent = pages[key].winTitle;
            document.title = pages[key].winTitle;
            statusLeft.textContent = pages[key].label;
            const n = pages[key].entries ? pages[key].entries.length : (key==='library' ? books.length : 0);
            statusRight.textContent = n > 0 ? `${n} item${n>1?'s':''}` : 'ready';
            if (bodyEl) bodyEl.scrollTop = 0;
            startTypewriter(pages[key].words);
            currentKey = key;
            if (!fromNav) history.replaceState(null,'','#'+key);
            if (key==='puzzle') { const c=$('svdCanvas'); if(c) ensureObserver(c); }
            else disconnectObserver();
        }
        function transitionToPage(key) {
            if (isTransitioning) return;
            isTransitioning = true;
            playCrtPop();
            if (crtScreen) {
                crtScreen.classList.add('crt-shutdown');
                setTimeout(() => {
                    swapPageContent(key, true);
                    crtScreen.classList.remove('crt-shutdown');
                    crtScreen.classList.add('crt-startup');
                    setTimeout(() => { crtScreen.classList.remove('crt-startup'); isTransitioning=false; }, 400);
                }, 70);
            } else { swapPageContent(key, true); isTransitioning=false; }
        }
        nav.addEventListener('click', e => {
            const a = e.target.closest('a[data-page]');
            if (!a) return;
            e.preventDefault();
            transitionToPage(a.dataset.page);
        });
        window.addEventListener('hashchange', () => {
            const k = location.hash.replace('#','');
            if (k && k!==currentKey && pages[k]) transitionToPage(k);
        });

        // ── glitch button ─────────────────────────────────────────────
        const glitchBtn = $('glitch');
        function moveGlitch() {
            if (!glitchBtn||!glitchBtn.isConnected||puzzleSolved) return;
            const pad=28, maxX=Math.max(0,window.innerWidth-76), maxY=Math.max(0,window.innerHeight-76);
            glitchBtn.style.left = Math.min(pad+Math.random()*maxX,maxX)+'px';
            glitchBtn.style.top  = Math.min(pad+Math.random()*maxY,maxY)+'px';
        }
        if (glitchBtn) {
            if (puzzleSolved) glitchBtn.remove();
            else {
                (function scheduleGlitch() {
                    moveGlitch();
                    glitchInterval = setTimeout(scheduleGlitch, 3200+Math.random()*6400);
                })();
                window.addEventListener('resize', moveGlitch);
                glitchBtn.addEventListener('click', () => transitionToPage('puzzle'));
            }
        }

        // ── clock ─────────────────────────────────────────────────────
        function tickClock() {
            const d=new Date(), h12=((d.getHours()+11)%12)+1;
            clockEl.textContent = `${h12}:${String(d.getMinutes()).padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;
        }
        tickClock();
        setInterval(tickClock, 1000);
        document.addEventListener('visibilitychange', () => { if (!document.hidden) tickClock(); });

        // ── init ──────────────────────────────────────────────────────
        const initial = location.hash.replace('#','') || 'notes';
        swapPageContent(initial);
    })();
    </script>
</body>
</html>
