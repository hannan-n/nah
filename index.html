<!DOCTYPE html>
<html lang="en" class="h-card">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#d4c8b0">
    <meta name="color-scheme" content="light dark">
    <title>nah.hannan — notes, systems, probability</title>
    <meta name="description" content="hannan nabi. notes on systems, probability, and small experiments. an interactive svd lives at the bottom of the page.">
    <meta name="author" content="Hannan Nabi">
    <link rel="canonical" href="https://nah-hannan.com/">
    <link rel="me" href="https://github.com/nahhannan">
    <link rel="me" href="https://twitter.com/nahhannan">
    <link rel="me" href="mailto:hannan@nah.hannan">
    <link rel="webmention" href="https://webmention.io/nahhannan/webmention">
    <link rel="alternate" type="application/rss+xml" title="nah.hannan notes" href="/feed.xml">
    <link href="https://fonts.bunny.net/css?family=ibm-plex-mono:400,500,600|vt323:400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f5f2e8;
            --paper-2: #ece8da;
            --paper-3: #e0dcce;
            --ink: #1a1a1a;
            --ink-soft: #6b6b5e;
            --rule: #c4bca8;
            --rule-soft: #d8d0bc;
            --case-hi: #ebe0c8;
            --case-1: #d8cab0;
            --case-2: #c8b896;
            --case-3: #b8a880;
            --case-ink: #5a4c30;
            --bezel-1: #1a1815;
            --bezel-2: #2a2620;
            --accent: #00aa44;
            --danger: #cc3333;
            --terminal-bg: #1a1a1a;
            --terminal-text: #b0ffb0;
            --mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
            --pixel: 'VT323', ui-monospace, monospace;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            font-family: var(--mono);
            font-size: 14px;
            color: var(--ink);
        }
        body {
            background: radial-gradient(120% 80% at 50% 0%, #e8d8b8 0%, transparent 60%),
                radial-gradient(80% 60% at 50% 100%, #b8a888 0%, transparent 50%),
                linear-gradient(160deg, #d4c4a4 0%, #b8a888 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 16px;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.01) 0 1px, transparent 1px 3px);
            z-index: 1;
        }
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 1px;
        }
        .mac {
            position: relative;
            width: min(760px, 100%);
            background: linear-gradient(180deg, var(--case-hi) 0%, var(--case-1) 8%, var(--case-2) 65%, var(--case-3) 100%);
            border-radius: 16px 16px 22px 22px;
            padding: 22px 22px 0;
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.5), inset 0 -2px 0 rgba(0, 0, 0, 0.15),
                inset 2px 0 0 rgba(255, 255, 255, 0.22), inset -2px 0 0 rgba(0, 0, 0, 0.12),
                0 30px 60px -20px rgba(60, 40, 20, 0.4), 0 8px 20px -8px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }
        .vents {
            display: flex;
            justify-content: center;
            gap: 3px;
            padding: 2px 0 14px;
        }
        .vents span {
            width: 3px;
            height: 9px;
            border-radius: 1px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.12));
            box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.4), 0 1px 0 rgba(255, 255, 255, 0.28);
        }
        .bezel {
            background: linear-gradient(180deg, var(--bezel-1) 0%, var(--bezel-2) 50%, var(--bezel-1) 100%);
            border-radius: 7px;
            padding: 13px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.55), inset 0 -1px 0 rgba(255, 255, 255, 0.04),
                0 1px 0 rgba(255, 255, 255, 0.35);
        }
        .screen {
            background: var(--paper);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            min-height: 540px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 24px rgba(120, 100, 60, 0.16), inset 0 0 0 1px rgba(0, 0, 0, 0.08);
        }
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(180deg, rgba(0, 0, 0, 0.015) 0 1px, transparent 1px 3px);
            pointer-events: none;
            z-index: 5;
        }
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(120% 90% at 50% 50%, transparent 62%, rgba(80, 60, 30, 0.14) 100%);
            pointer-events: none;
            z-index: 5;
        }
        .crt-shutdown {
            animation: crtCollapse 0.07s cubic-bezier(0.4, 0, 1, 1) forwards;
        }
        @keyframes crtCollapse {
            0% {
                transform: scaleY(1);
                opacity: 1;
                filter: brightness(1);
            }
            60% {
                transform: scaleY(0.05);
                opacity: 0;
                filter: brightness(0);
                background: #1a1a1a;
            }
            100% {
                transform: scaleY(0);
                opacity: 0;
                filter: brightness(0);
                background: #0a0a0a;
            }
        }
        .crt-startup {
            animation: crtExpand 0.4s ease-out forwards;
        }
        @keyframes crtExpand {
            0% {
                transform: scaleY(0);
                opacity: 0;
                filter: brightness(0);
                background: #0a0a0a;
            }
            70% {
                transform: scaleY(0.9);
                opacity: 0.8;
                filter: brightness(0.8);
                background: #e0d8c0;
            }
            100% {
                transform: scaleY(1);
                opacity: 1;
                filter: brightness(1);
                background: transparent;
            }
        }
        .menubar {
            height: 22px;
            background: var(--paper);
            border-bottom: 1px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-family: var(--pixel);
            font-size: 16px;
            position: relative;
            z-index: 6;
            user-select: none;
        }
        .menubar .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .menubar .apple {
            padding: 1px 4px;
            border-radius: 2px;
            cursor: default;
        }
        .menubar .apple:hover {
            background: var(--ink);
            color: var(--paper);
        }
        .menubar .apple svg {
            width: 12px;
            height: 15px;
        }
        .menubar .mitem {
            padding: 1px 4px;
            border-radius: 2px;
            cursor: default;
        }
        .menubar .mitem:hover {
            background: var(--ink);
            color: var(--paper);
        }
        .menubar .clock {
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
        }
        .window {
            margin: 10px;
            background: var(--paper);
            border: 1px solid var(--ink);
            box-shadow: 1px 1px 0 var(--ink);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        .titlebar {
            height: 19px;
            border-bottom: 1px solid var(--ink);
            background: repeating-linear-gradient(180deg, var(--ink) 0 1px, var(--paper) 1px 3px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: var(--pixel);
            font-size: 14px;
            letter-spacing: 0.5px;
            color: var(--ink);
        }
        .titlebar .close {
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 11px;
            height: 11px;
            background: var(--paper);
            border: 1px solid var(--ink);
        }
        .title-text {
            background: var(--paper);
            padding: 0 12px;
            white-space: nowrap;
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--ink);
            background: var(--ink);
            gap: 1px;
            font-family: var(--pixel);
            font-size: 15px;
        }
        .nav a {
            background: var(--paper-2);
            color: var(--ink);
            text-decoration: none;
            padding: 4px 11px;
            flex: 1 1 auto;
            text-align: center;
            user-select: none;
            letter-spacing: 0.5px;
            line-height: 1.2;
            transition: background 80ms;
            cursor: pointer;
        }
        .nav a:hover,
        .nav a.active {
            background: var(--ink);
            color: var(--paper);
        }
        .body {
            padding: 22px 22px 16px;
            overflow: auto;
            flex: 1;
            min-height: 0;
            line-height: 1.55;
            font-size: 13px;
        }
        .body::-webkit-scrollbar {
            width: 14px;
        }
        .body::-webkit-scrollbar-track {
            background: repeating-linear-gradient(0deg, var(--paper-2) 0 2px, var(--paper) 2px 4px);
            border-left: 1px solid var(--ink);
        }
        .body::-webkit-scrollbar-thumb {
            background: var(--paper);
            border: 1px solid var(--ink);
            box-shadow: inset 1px 1px 0 var(--paper-2);
        }
        .hero {
            font-family: var(--pixel);
            font-size: 38px;
            line-height: 1;
            margin: 4px 0 6px;
            color: var(--ink);
            min-height: 40px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: baseline;
        }
        .hero .typed {
            white-space: pre-wrap;
            word-break: break-word;
        }
        .caret {
            display: inline-block;
            width: 0.55ch;
            height: 0.9em;
            background: var(--accent);
            margin-left: 3px;
            transform: translateY(3px);
            animation: blink 1.05s steps(1) infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .tagline {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--ink-soft);
            letter-spacing: 0.03em;
            margin-bottom: 22px;
        }
        .feed {
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--rule-soft);
        }
        .row {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 16px;
            padding: 10px 2px;
            border-bottom: 1px solid var(--rule-soft);
            align-items: baseline;
            color: inherit;
        }
        .row time,
        .row .label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-soft);
            font-variant-numeric: tabular-nums;
        }
        .row .title {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--ink);
        }
        .row .tag {
            font-family: var(--pixel);
            font-size: 13px;
            color: var(--ink-soft);
            opacity: 0;
            transition: opacity 120ms;
        }
        .row:hover {
            background: rgba(0, 0, 0, 0.04);
        }
        .row:hover .tag {
            opacity: 1;
        }
        .row.lib .label {
            color: var(--ink);
            font-family: var(--pixel);
            font-size: 14px;
        }
        .promptline {
            margin-top: 22px;
            padding-top: 14px;
            border-top: 1px solid var(--rule-soft);
            font-family: var(--mono);
            font-size: 12px;
            color: var(--ink-soft);
            line-height: 1.5;
        }
        .lib-category {
            margin: 18px 0 8px;
            font-family: var(--pixel);
            font-size: 16px;
            letter-spacing: 0.5px;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            color: var(--ink);
        }
        .book-entry {
            border-bottom: 1px solid var(--rule-soft);
            cursor: pointer;
            user-select: none;
            transition: background 80ms;
        }
        .book-entry:hover {
            background: rgba(0, 0, 0, 0.03);
        }
        .book-title-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            padding: 8px 4px;
            align-items: baseline;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--ink);
        }
        .book-author {
            font-size: 11px;
            color: var(--ink-soft);
            text-align: right;
        }
        .book-thoughts {
            display: none;
            padding: 0 4px 10px 16px;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--ink-soft);
            line-height: 1.6;
            border-left: 2px solid var(--accent);
            margin-left: 4px;
            margin-bottom: 4px;
            font-style: italic;
        }
        .book-entry.open .book-thoughts {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        .book-entry.open {
            background: rgba(0, 170, 68, 0.04);
        }
        .terminal-sign {
            background: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 16px;
            border: 2px solid #333;
            font-family: var(--mono);
            font-size: 13px;
            margin-top: 20px;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .terminal-sign h3 {
            color: #a0ffa0;
            font-family: var(--pixel);
            font-size: 18px;
            margin-bottom: 8px;
        }
        .terminal-prompt {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }
        .terminal-prompt span {
            color: #80ff80;
            margin-right: 6px;
        }
        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--terminal-text);
            font-family: var(--mono);
            font-size: 14px;
            outline: none;
            caret-color: var(--accent);
        }
        .terminal-log {
            list-style: none;
            margin-top: 10px;
            max-height: 160px;
            overflow-y: auto;
        }
        .terminal-log li {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        /* rendering artifact: low opacity baseline so it reads as noise, not invitation */
        .bug-pixel {
            display: inline-block;
            cursor: pointer;
            font-family: var(--pixel);
            font-size: 14px;
            color: var(--ink-soft);
            opacity: 0.28;
            margin: 0 3px;
            animation: bug-flicker 4.5s steps(1) infinite;
            user-select: none;
        }
        .bug-pixel:hover {
            animation: bug-shake 180ms steps(2) infinite;
            color: var(--ink);
            opacity: 0.6;
        }
        @keyframes bug-flicker {
            0%,
            65%,
            78%,
            100% {
                opacity: 0.28;
            }
            72%,
            80% {
                opacity: 0.07;
            }
        }
        @keyframes bug-shake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(-1px, 1px);
            }
            50% {
                transform: translate(1px, -1px);
            }
            75% {
                transform: translate(-2px, 0);
            }
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--paper);
            border: 2px solid var(--ink);
            box-shadow: 4px 4px 0 var(--ink), 0 20px 40px rgba(0, 0, 0, 0.4);
            padding: 20px 24px;
            max-width: 380px;
            width: 90%;
            font-family: var(--mono);
            font-size: 13px;
            position: relative;
            animation: fadeIn 0.15s ease;
        }
        .modal-close {
            position: absolute;
            top: 4px;
            right: 8px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--ink);
            font-family: var(--pixel);
        }
        .puzzle-modal-input {
            width: 100%;
            font-family: var(--mono);
            font-size: 14px;
            padding: 4px 8px;
            border: 1px solid var(--ink);
            margin: 8px 0;
            background: #fffef9;
        }
        .puzzle-modal-btn {
            font-family: var(--pixel);
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .puzzle-modal-btn:hover {
            background: var(--accent);
            color: var(--ink);
        }
        .glitch {
            position: fixed;
            z-index: 9998;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: var(--pixel);
            font-size: 18px;
            color: var(--ink);
            opacity: 0.35;
            padding: 6px 8px;
            border-radius: 2px;
            transition: opacity 0.2s ease, left 1.4s cubic-bezier(0.4, 0.05, 0.2, 1), top 1.4s cubic-bezier(0.4, 0.05, 0.2, 1);
            user-select: none;
            animation: glitch-flicker 8s steps(1) infinite;
        }
        @keyframes glitch-flicker {
            0%,
            92%,
            94%,
            96%,
            100% {
                opacity: 0.35;
            }
            93% {
                opacity: 0.08;
            }
            95% {
                opacity: 0.6;
            }
            97% {
                opacity: 0.15;
            }
        }
        .glitch:hover,
        .glitch:focus-visible {
            opacity: 1;
            color: var(--accent);
            animation: shake 90ms steps(2) infinite;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(-1.5px, -1px);
            }
            50% {
                transform: translate(1.5px, 1.5px);
            }
            75% {
                transform: translate(-1px, 1.5px);
            }
        }
        .glitch.vanishing {
            animation: pixel-collapse 0.5s ease-in forwards;
            pointer-events: none;
        }
        @keyframes pixel-collapse {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: brightness(1);
            }
            60% {
                transform: scale(0.3);
                opacity: 0.4;
                filter: brightness(3);
                color: var(--accent);
            }
            100% {
                transform: scale(0);
                opacity: 0;
                filter: brightness(0);
                color: var(--accent);
            }
        }
        .statusbar {
            height: 18px;
            border-top: 1px solid var(--ink);
            background: var(--paper-2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-family: var(--pixel);
            font-size: 13px;
            color: var(--ink-soft);
        }
        .chin {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 4px 18px;
            color: var(--case-ink);
            font-family: var(--pixel);
            font-size: 15px;
            letter-spacing: 1.2px;
        }
        .chin .label {
            font-style: italic;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .floppy {
            width: 46px;
            height: 12px;
            background: linear-gradient(180deg, var(--bezel-2), var(--bezel-1));
            border: 1px solid #4a4540;
            border-radius: 1px;
            position: relative;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 -1px 0 rgba(0, 0, 0, 0.5);
        }
        .floppy::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 2px;
            background: #0a0a0a;
            border-radius: 1px;
        }
        .drag-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: var(--pixel);
            font-size: 24px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .drag-overlay.show {
            opacity: 1;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .h-card-hidden {
            display: none;
        }
        ::selection {
            background: var(--ink);
            color: var(--paper);
        }
        @media (max-width: 560px) {
            body {
                padding: 12px 8px;
            }
            .mac {
                padding: 14px 14px 0;
                border-radius: 14px 14px 18px 18px;
            }
            .bezel {
                padding: 10px;
            }
            .screen {
                min-height: 500px;
            }
            .window {
                margin: 6px;
            }
            .body {
                padding: 16px 14px 12px;
                font-size: 12.5px;
            }
            .hero {
                font-size: 26px;
                min-height: 30px;
            }
            .nav {
                font-size: 13px;
            }
            .row {
                grid-template-columns: 78px 1fr;
                gap: 10px;
            }
            .row .tag {
                display: none;
            }
            .modal-content {
                padding: 14px 16px;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .caret,
            .glitch,
            .bug-pixel {
                animation: none;
            }
            .crt-shutdown,
            .crt-startup,
            .glitch.vanishing {
                animation: none;
            }
        }
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .mac,
            .bezel,
            .window {
                box-shadow: none;
                border: none;
                background: white;
            }
            .vents,
            .chin,
            .menubar,
            .titlebar,
            .statusbar,
            .glitch,
            .nav,
            .modal-overlay {
                display: none;
            }
            .body {
                overflow: visible;
            }
            .page {
                display: block !important;
            }
            .book-thoughts {
                display: block !important;
            }
        }

        /* ── PUZZLE TERMINAL ─────────────────────────────────────────────────── */
        /* mirrors .terminal-sign; lives inside the dark CRT shell               */
        .terminal-puzzle {
            background: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 16px;
            border: 2px solid #333;
            font-family: var(--mono);
            font-size: 13px;
            margin-top: 8px;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .terminal-puzzle h3 {
            color: #a0ffa0;
            font-family: var(--pixel);
            font-size: 18px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .lede {
            font-size: 11.5px;
            color: #70a070;
            line-height: 1.65;
            margin-bottom: 14px;
        }
        .lede em {
            color: #90c090;
            font-style: normal;
        }
        .puzzle-math {
            font-family: var(--mono);
            font-size: 12px;
            color: #608060;
            background: rgba(0, 0, 0, 0.35);
            padding: 8px 12px;
            margin: 10px 0;
            border-left: 2px solid #2a5a2a;
            white-space: pre;
            letter-spacing: 0.04em;
            line-height: 1.5;
        }
        /* the canvas lives here — intrinsic size set via JS on first paint */
        .matrix-stage {
            width: 100%;
            height: 220px;
            display: block;
            margin: 10px 0;
            border: 1px solid #2a2a2a;
            border-radius: 2px;
            background: #111;
        }
        .puzzle-readout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            margin: 10px 0;
            padding: 8px 0;
            border-top: 1px solid #2a2a2a;
            border-bottom: 1px solid #2a2a2a;
        }
        .k {
            color: #507050;
            font-size: 11px;
            font-family: var(--mono);
            letter-spacing: 0.03em;
        }
        .v {
            color: var(--terminal-text);
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.02em;
        }
        /* recoverability states — semantically meaningful, not decorative */
        .highlight { color: var(--accent) !important; }
        .warning   { color: var(--danger)  !important; }
        .puzzle-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0 6px;
            flex-wrap: wrap;
        }
        .puzzle-input-group label {
            color: #70a070;
            font-family: var(--mono);
            font-size: 12px;
            min-width: 10px;
        }
        .matrix-input {
            width: 54px;
            background: #0a0a0a;
            border: 1px solid #3a3a3a;
            color: var(--terminal-text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 3px 6px;
            text-align: center;
            -moz-appearance: textfield;
        }
        .matrix-input::-webkit-inner-spin-button,
        .matrix-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .matrix-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }
        .kbd-hints {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 10.5px;
            color: #3a5a3a;
            margin: 4px 0 10px;
            user-select: none;
        }
        .kbd-hints kbd {
            background: #111;
            border: 1px solid #333;
            border-radius: 2px;
            padding: 0 4px;
            font-family: var(--mono);
            font-size: 10px;
            color: #609060;
        }
        .btn {
            font-family: var(--pixel);
            background: #111;
            color: #609060;
            border: 1px solid #3a3a3a;
            padding: 3px 12px;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: background 80ms, color 80ms, border-color 80ms;
        }
        .btn:hover {
            background: var(--accent);
            color: var(--ink);
            border-color: var(--accent);
        }
        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .puzzle-reward {
            display: none;
            margin-top: 14px;
            padding: 10px 12px;
            border: 1px solid #2a5a2a;
            background: rgba(0, 50, 15, 0.4);
            font-size: 11.5px;
            color: var(--terminal-text);
            line-height: 1.75;
            font-family: var(--mono);
        }
        .puzzle-reward a { color: #80c080; }
        @media (max-width: 560px) {
            .puzzle-readout { grid-template-columns: 1fr; }
            .matrix-stage { height: 160px; }
        }
    </style>
</head>

    <script>
        (() => {
            const $ = id => document.getElementById(id);
            const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

            // ---------- SAFE STORAGE ----------
            function safeGet(k, fallback) {
                try { const v = localStorage.getItem(k); return v !== null ? v : fallback; } catch (e) { return fallback; }
            }

            function safeSet(k, v) {
                try { localStorage.setItem(k, v); } catch (e) { /* quota exceeded or private mode */ }
            }

            function safeGetJSON(k, fallback) {
                try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; }
            }

            function safeSetJSON(k, v) {
                try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { /* quota exceeded or private mode */ }
            }

            // ---------- STATE ----------
            const STORAGE_KEY = 'nah_hannan_puzzle_solved';
            const BUGS_KEY = 'nah_tiny_bugs_solved';
            const SIGN_KEY = 'nah_hannan_sign_space';

            let puzzleSolved = safeGet(STORAGE_KEY, 'false') === 'true';
            let tinyBugsSolved = safeGetJSON(BUGS_KEY, {});

            // Puzzle 3 state — unlocked by reading source and entering the right equation
            const SOURCE_KEY = 'nah_hannan_source_found';
            let sourcePuzzleSolved = safeGet(SOURCE_KEY, 'false') === 'true';

            // closure-scoped so markSolved can cancel it without touching window
            let glitchInterval = null;

            // ---------- Shared ResizeObserver (created once) ----------
            let svdResizeObserver = null;
            let svdRedrawPending = null;

            function ensureObserver(canvas) {
                if (!canvas) return;
                if (!svdResizeObserver) {
                    svdResizeObserver = new ResizeObserver(() => {
                        if (svdRedrawPending) cancelAnimationFrame(svdRedrawPending);
                        svdRedrawPending = requestAnimationFrame(updateSVD);
                    });
                }
                svdResizeObserver.observe(canvas);
            }

            function disconnectObserver() {
                if (svdResizeObserver) {
                    svdResizeObserver.disconnect();
                }
            }

            // ---------- SOLVE HANDLERS ----------
            function markSolved() {
                if (puzzleSolved) return;
                puzzleSolved = true;
                safeSet(STORAGE_KEY, 'true');
                const g = $('glitch');
                if (!g) return;
                g.classList.add('vanishing');
                g.addEventListener('animationend', () => { if (g.parentNode) g.remove(); }, { once: true });
                if (glitchInterval) { clearTimeout(glitchInterval); glitchInterval = null; }
            }

            function markBugSolved(bugId) {
                tinyBugsSolved[bugId] = true;
                safeSetJSON(BUGS_KEY, tinyBugsSolved);
                const count = Object.keys(tinyBugsSolved).filter(k => tinyBugsSolved[k]).length;
                if (count === 2) {
                    const overlay = $('dragOverlay');
                    if (overlay) {
                        overlay.classList.add('show');
                        setTimeout(() => { overlay.classList.remove('show');
                            transitionToPage('sign'); }, 1800);
                    }
                } else if (count === 3) {
                    const modal = $('puzzleModal'),
                        body = $('modalBody');
                    body.innerHTML = '<p>three instabilities, all settled.</p><p>nothing seems to be flickering now.</p>';
                    modal.classList.add('active');
                    setTimeout(() => modal.classList.remove('active'), 3000);
                }
            }

            // ---------- DATA: BOOKS ----------
            const books = [
                { title: 'Probability Theory: The Logic of Science', author: 'E.T. Jaynes', cat: 'Probability & Statistical Inference', thoughts: 'Probability as information and ignorance, not dice. Reading it shifted how I think about almost everything statistical, though I\'m still working through some of the later chapters.' },
                { title: 'Bayesian Data Analysis', author: 'Gelman, Carlin, Stern, Rubin', cat: 'Probability & Statistical Inference', thoughts: 'The book I open when I actually have to compute something. Jaynes gave me the picture; this gave me the machinery.' },
                { title: 'Statistical Rethinking', author: 'Richard McElreath', cat: 'Probability & Statistical Inference', thoughts: 'McElreath writes the way a patient teacher talks. He sneaks causal reasoning in early, which most stats books still don\'t do.' },
                { title: 'All of Statistics', author: 'Larry Wasserman', cat: 'Probability & Statistical Inference', thoughts: 'Compressed almost to a fault. A useful second book, less so a first.' },
                { title: 'Statistical Inference', author: 'Casella & Berger', cat: 'Probability & Statistical Inference', thoughts: 'The standard grad text, and rightly so. The sufficiency and likelihood-principle chapters are the parts I\'ve gone back to most often.' },
                { title: 'An Introduction to Probability Theory', author: 'William Feller', cat: 'Probability & Statistical Inference', thoughts: 'Volume I in particular. Feller seems to enjoy generating functions, and you start to as well.' },
                { title: 'Elements of Information Theory', author: 'Cover & Thomas', cat: 'Probability & Statistical Inference', thoughts: 'Where probability and computation start sharing notation. Entropy, mutual information, AEP — most of modern ML is downstream of these ideas.' },
                { title: 'Probability with Martingales', author: 'David Williams', cat: 'Probability & Statistical Inference', thoughts: 'Short, precise, occasionally funny. The footnotes are worth reading.' },
                { title: 'Probability and Random Processes', author: 'Grimmett & Stirzaker', cat: 'Probability & Statistical Inference', thoughts: 'Wide-ranging without trying to be a brick. The exercises are unusually well chosen.' },
                { title: 'Theory of Point Estimation', author: 'Lehmann & Casella', cat: 'Probability & Statistical Inference', thoughts: 'Rigorous in the way that becomes useful later. Worth coming back to once you\'ve built up enough scar tissue.' },
                { title: 'Linear Algebra and Its Applications', author: 'Gilbert Strang', cat: 'Mathematics', thoughts: 'Strang teaches it as geometry first. The SVD chapters are the reason the little widget at the bottom of this site exists.' },
                { title: 'Linear Algebra Done Right', author: 'Sheldon Axler', cat: 'Mathematics', thoughts: 'Determinants get pushed to the last chapter, and by the time you arrive you understand why he did that.' },
                { title: 'Principles of Mathematical Analysis', author: 'Walter Rudin', cat: 'Mathematics', thoughts: 'Baby Rudin. Terse, elegant, hard. You don\'t exactly read it so much as work through it slowly, and a lot of analysis feels more approachable afterwards.' },
                { title: 'Visual Complex Analysis', author: 'Tristan Needham', cat: 'Mathematics', thoughts: 'Picks geometry where most books pick algebra. Worth reading even if you already know the material.' },
                { title: 'Convex Optimization', author: 'Boyd & Vandenberghe', cat: 'Mathematics', thoughts: 'Boyd has an eye for spotting when something is secretly convex. That skill is more transferable than it sounds.' },
                { title: 'Numerical Linear Algebra', author: 'Trefethen & Bau', cat: 'Mathematics', thoughts: 'Short, careful, full of the right intuitions about conditioning and stability. I reread the SVD chapters every year or two.' },
                { title: 'Concrete Mathematics', author: 'Graham, Knuth, Patashnik', cat: 'Mathematics', thoughts: 'Continuous and discrete in the same breath. Grew out of the margins of TAOCP, and reads like that — playful in a precise way.' },
                { title: 'Vector Calculus', author: 'Hubbard & Hubbard', cat: 'Mathematics', thoughts: 'Bundles linear algebra and multivariable calculus together, and after enough chapters you notice that Green\'s, Stokes\', and the divergence theorem are pretty much one theorem.' },
                { title: 'Algebra', author: 'Michael Artin', cat: 'Mathematics', thoughts: 'Artin leans on symmetry and geometry. The group theory and Galois chapters are the ones I think about most.' },
                { title: 'The Calculus Lifesaver', author: 'Adrian Banner', cat: 'Mathematics', thoughts: 'A TA\'s lecture notes that turned into a book. You can tell he\'s explained epsilon-deltas more than a few times.' },
                { title: 'Pattern Recognition and Machine Learning', author: 'Christopher Bishop', cat: 'Machine Learning & AI', thoughts: 'The Bayesian-leaning ML text. The graphical models and variational inference chapters still hold up.' },
                { title: 'Machine Learning: A Probabilistic Perspective', author: 'Kevin Murphy', cat: 'Machine Learning & AI', thoughts: 'Wide-ranging without going thin. Useful as a reference for almost any probabilistic model you might want to look up.' },
                { title: 'Deep Learning', author: 'Goodfellow, Bengio, Courville', cat: 'Machine Learning & AI', thoughts: 'Already a bit of a period piece, but Part III aged interestingly — the representation-learning sections still shape how I think about latent spaces.' },
                { title: 'Reinforcement Learning: An Introduction', author: 'Sutton & Barto', cat: 'Machine Learning & AI', thoughts: 'They\'ve been refining this book since 1998 and you can feel it. The TD-learning and eligibility-traces chapters are the parts I\'ve reread.' },
                { title: 'The Elements of Statistical Learning', author: 'Hastie, Tibshirani, Friedman', cat: 'Machine Learning & AI', thoughts: 'Better as a second book than a first. You get more from it after you\'ve already built a few models that worked, or didn\'t.' },
                { title: 'Information Theory, Inference, and Learning Algorithms', author: 'David MacKay', cat: 'Machine Learning & AI', thoughts: 'MacKay clearly enjoyed writing it. Information theory, Bayesian inference, and neural networks treated as one subject, which they more or less are.' },
                { title: 'Probabilistic Graphical Models', author: 'Koller & Friedman', cat: 'Machine Learning & AI', thoughts: 'Long, but rewarding. The structure-learning and causality chapters still feel relevant.' },
                { title: 'Understanding Machine Learning', author: 'Shalev-Shwartz & Ben-David', cat: 'Machine Learning & AI', thoughts: 'A friendly introduction to PAC learning. The bias-complexity and VC dimension chapters are the clearest I know.' },
                { title: 'Understanding Deep Learning', author: 'Simon Prince', cat: 'Machine Learning & AI', thoughts: 'A 2023 book that already feels like the one to start with. Rebuilds the field from first principles, with a probabilistic eye.' },
                { title: 'Gaussian Processes for Machine Learning', author: 'Rasmussen & Williams', cat: 'Machine Learning & AI', thoughts: 'The GP book. Elegant and practical at the same time. The chapters on designing covariance functions are quietly excellent.' },
                { title: 'Thinking in Systems', author: 'Donella Meadows', cat: 'Systems & Complexity', thoughts: 'The clearest small book about why most well-intentioned fixes don\'t work. Leverage points are almost never where they look like they should be.' },
                { title: 'Complexity: A Guided Tour', author: 'Melanie Mitchell', cat: 'Systems & Complexity', thoughts: 'A tour through the Santa Fe lineage. Emergence, self-organisation, and scaling laws, explained without too much hand-waving.' },
                { title: 'Systemantics', author: 'John Gall', cat: 'Systems & Complexity', thoughts: 'Gall\'s law — a complex system that works has almost always grown out of a simpler one that worked — is one of those things you keep finding new instances of.' },
                { title: 'The Mythical Man-Month', author: 'Fred Brooks', cat: 'Systems & Complexity', thoughts: 'Written about OS/360 in 1975 and somehow still the most honest book about software. "Adding manpower to a late project makes it later" turns out to be approximately a law of nature.' },
                { title: 'A Philosophy of Software Design', author: 'John Ousterhout', cat: 'Systems & Complexity', thoughts: 'Compact, opinionated, mostly right. The case for deep modules is the part I think about most.' },
                { title: 'Designing Data-Intensive Applications', author: 'Martin Kleppmann', cat: 'Systems & Complexity', thoughts: 'Helps you see that most of your database choices are actually consistency-versus-availability choices in disguise.' },
                { title: 'The Sciences of the Artificial', author: 'Herbert Simon', cat: 'Systems & Complexity', thoughts: 'Simon takes the idea of "designing something" seriously, in a way that\'s easy to miss. The chapters on bounded rationality and on the architecture of complexity are the ones I keep returning to.' },
                { title: 'Gödel, Escher, Bach', author: 'Douglas Hofstadter', cat: 'Systems & Complexity', thoughts: 'Self-reference and strange loops. I\'ve read it three times across about fifteen years, and got something different each time.' },
                { title: 'Steps to an Ecology of Mind', author: 'Gregory Bateson', cat: 'Systems & Complexity', thoughts: 'Bateson was thinking about cybernetics, ecology, and epistemology together long before the conversation caught up to him.' },
                { title: 'The Quark and the Jaguar', author: 'Murray Gell-Mann', cat: 'Systems & Complexity', thoughts: 'A physicist\'s long, slightly meandering meditation on simplicity and complexity. The idea of "plectics" still hasn\'t caught on, but it\'s a good one.' },
                { title: 'Options, Futures, and Other Derivatives', author: 'John C. Hull', cat: 'Economics & Finance', thoughts: 'The industry standard for a reason. Methodical, occasionally dry, but rarely confusing.' },
                { title: 'Stochastic Calculus for Finance', author: 'Steven Shreve', cat: 'Economics & Finance', thoughts: 'Two volumes. The first builds the discrete-time picture carefully, and the second carries it into continuous time without losing the thread.' },
                { title: 'Paul Wilmott on Quantitative Finance', author: 'Paul Wilmott', cat: 'Economics & Finance', thoughts: 'Wilmott never forgets that a model is a model. His scepticism about over-mathematising finance reads well, especially in retrospect.' },
                { title: 'The Black Swan', author: 'Nassim Nicholas Taleb', cat: 'Economics & Finance', thoughts: 'The core point — that rare events do most of the heavy lifting — is more important than the prose around it sometimes suggests.' },
                { title: 'Antifragile', author: 'Nassim Nicholas Taleb', cat: 'Economics & Finance', thoughts: 'The idea that some systems get stronger under volatility is the kind of thing that\'s useful even when you set the rest of the framing aside.' },
                { title: 'Fooled by Randomness', author: 'Nassim Nicholas Taleb', cat: 'Economics & Finance', thoughts: 'Taleb\'s first and most personal book. The point about how easily we confuse luck with skill is more felt here than later.' },
                { title: 'The Signal and the Noise', author: 'Nate Silver', cat: 'Economics & Finance', thoughts: 'A practitioner\'s tour of forecasting under uncertainty. The case studies are where the Bayesian thinking actually shows up.' },
                { title: 'Against the Gods: The Remarkable Story of Risk', author: 'Peter Bernstein', cat: 'Economics & Finance', thoughts: 'A history of how we learned to quantify uncertainty. Pascal through Markowitz, told as a story.' },
                { title: 'The Misbehavior of Markets', author: 'Mandelbrot & Hudson', cat: 'Economics & Finance', thoughts: 'Mandelbrot makes the case that markets are wilder than the gaussian assumptions allow. The fractal view is a useful corrective even where it overreaches.' },
                { title: 'Inequality: A Genetic History', author: 'Carles Lalueza-Fox', cat: 'Economics & Finance', thoughts: 'Not really about economics, but about the long history of inequality as it shows up in our DNA. A slightly odd inclusion here, but it stuck with me.' },
                { title: 'Philosophical Investigations', author: 'Ludwig Wittgenstein', cat: 'Philosophy', thoughts: 'The later Wittgenstein, taking apart the earlier one. Meaning as use rather than reference, which is a smaller and stranger claim than it first sounds.' },
                { title: 'The Structure of Scientific Revolutions', author: 'Thomas Kuhn', cat: 'Philosophy', thoughts: 'Kuhn gave us "paradigm shift" and then spent decades explaining that people had taken it the wrong way. Both halves of that are interesting.' },
                { title: 'The Logic of Scientific Discovery', author: 'Karl Popper', cat: 'Philosophy', thoughts: 'Falsifiability as the line between science and not-science. Tidy and not entirely true, but a good thing to argue with.' },
                { title: 'Against Method', author: 'Paul Feyerabend', cat: 'Philosophy', thoughts: 'Feyerabend argues that there isn\'t one "scientific method" so much as a collection of moves that happened to work. Frustrating in places, useful in others.' },
                { title: 'Darwin\'s Dangerous Idea', author: 'Daniel Dennett', cat: 'Philosophy', thoughts: 'Natural selection as a "universal acid" that eats through everything it touches. Whether you buy that or not, the argument is fun to follow.' },
                { title: 'Pragmatism', author: 'William James', cat: 'Philosophy', thoughts: 'James on the idea that a belief\'s meaning is in its consequences. A model is true to the extent it helps you find your way around.' },
                { title: 'We Have Never Been Modern', author: 'Bruno Latour', cat: 'Philosophy', thoughts: 'Latour dissolves the line between nature and culture in a way that\'s harder to dismiss than you might expect.' },
                { title: 'The Open Society and Its Enemies', author: 'Karl Popper', cat: 'Philosophy', thoughts: 'A defense of liberal democracy that reads, underneath, like systems thinking applied to politics.' },
                { title: 'What Is It Like to Be a Bat?', author: 'Thomas Nagel', cat: 'Philosophy', thoughts: 'A short paper that started a long argument. Subjective experience refuses to sit still for objective description.' },
                { title: 'Superintelligence', author: 'Nick Bostrom', cat: 'Philosophy', thoughts: 'You don\'t have to agree with the conclusions to find the orthogonality and instrumental-convergence ideas worth thinking about.' },
                { title: 'The Human Condition', author: 'Hannah Arendt', cat: 'Political Theory', thoughts: 'Arendt\'s split between labour, work, and action is a frame I find myself coming back to when thinking about automation.' },
                { title: 'A Theory of Justice', author: 'John Rawls', cat: 'Political Theory', thoughts: 'The veil of ignorance is one of those thought experiments that\'s simpler than it looks and more demanding than it sounds.' },
                { title: 'Anarchy, State, and Utopia', author: 'Robert Nozick', cat: 'Political Theory', thoughts: 'Nozick\'s libertarian reply to Rawls. The Wilt Chamberlain example does more work than its length suggests.' },
                { title: 'Discipline and Punish', author: 'Michel Foucault', cat: 'Political Theory', thoughts: 'Foucault on power as productive and diffuse, not just repressive. Changed how I read institutions, including the ones I work inside.' },
                { title: 'The Concept of the Political', author: 'Carl Schmitt', cat: 'Political Theory', thoughts: 'The friend/enemy distinction is uncomfortable to sit with, which is part of why it\'s analytically useful.' },
                { title: 'Two Concepts of Liberty', author: 'Isaiah Berlin', cat: 'Political Theory', thoughts: 'Negative versus positive liberty. A short essay that quietly resolves a lot of arguments.' },
                { title: 'On Tyranny', author: 'Timothy Snyder', cat: 'Political Theory', thoughts: 'Twenty short lessons from the twentieth century, applied to the twenty-first. The one about defending institutions has aged the most quickly.' },

            // ═══════════════════════════════════════════════════════════════
            // SVD · SINGULAR VALUE DECOMPOSITION · A = UΣVᵀ
            //
            // Every 2×2 matrix A factors into three operations:
            //   V  — rotate input space to align with the principal axes
            //   Σ  — scale along those axes by σ₁ and σ₂
            //   Uᵀ — rotate output space to its final orientation
            //
            // The singular values live on the diagonal of Σ.
            // They satisfy:   σ₁ · σ₂ = |det(A)|
            //
            // When σ₂ = 0:
            //   det(A) = 0   — no inverse
            //   rank(A) = 1  — one direction of information has nowhere to go
            //
            // This is a theorem, not a metaphor — although it reads as both.
            // ═══════════════════════════════════════════════════════════════
            function svd(a, b, c, d) {
                const ATA11 = a * a + c * c,
                    ATA12 = a * b + c * d,
                    ATA22 = b * b + d * d;
                const trace = ATA11 + ATA22,
                    detA = ATA11 * ATA22 - ATA12 * ATA12;
                const disc = Math.sqrt(Math.max(0, trace * trace / 4 - detA));
                return { sigma1: Math.sqrt(Math.max(0, trace / 2 + disc)), sigma2: Math.sqrt(Math.max(0, trace / 2 -
                        disc)) };
            }

            // isSingular colours the ellipse red and pulses the origin —
            // the visual correlate of σ₂ = 0, det(A) = 0, rank collapse.
            function drawSVD(ctx, w, h, a, b, c, d, isSingular) {
                const cx = w / 2,
                    cy = h / 2,
                    s  = Math.min(w, h) * 0.30; // responsive scale, not hardcoded

                // ── background ──────────────────────────────────────────────
                ctx.fillStyle = '#111111';
                ctx.fillRect(0, 0, w, h);

                // ── grid: separate x and y loops so both axes fill fully ───
                ctx.beginPath();
                ctx.strokeStyle = '#1c1c1c';
                ctx.lineWidth = 0.5;
                for (let x = cx % s; x <= w; x += s) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
                for (let y = cy % s; y <= h; y += s) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
                ctx.stroke();

                // ── axes ─────────────────────────────────────────────────────
                ctx.beginPath();
                ctx.strokeStyle = '#2e3e2e';
                ctx.lineWidth = 1;
                ctx.moveTo(0, cy); ctx.lineTo(w, cy);
                ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
                ctx.stroke();

                // ── unit circle: the "before" space, muted to recede ────────
                ctx.beginPath();
                ctx.strokeStyle = '#2a4a6a';
                ctx.lineWidth = 1;
                for (let t = 0; t <= Math.PI * 2 + 0.01; t += 0.02) {
                    const x = cx + Math.cos(t) * s, y = cy - Math.sin(t) * s;
                    t < 0.01 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // ── transformed ellipse: the "after" space, this is the story
                // singular → collapses to a line segment, drawn in danger colour
                ctx.beginPath();
                ctx.strokeStyle = isSingular ? '#aa3322' : '#b87840';
                ctx.lineWidth = 2;
                for (let t = 0; t <= Math.PI * 2 + 0.01; t += 0.02) {
                    const x0 = Math.cos(t), y0 = Math.sin(t);
                    const x1 = a * x0 + b * y0, y1 = c * x0 + d * y0;
                    const x = cx + x1 * s, y = cy - y1 * s;
                    t < 0.01 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // ── column vectors of A: where the standard basis lands ──────
                const drawArrow = (tx, ty) => {
                    const angle = Math.atan2(ty - cy, tx - cx), L = 7;
                    ctx.moveTo(tx, ty);
                    ctx.lineTo(tx - L * Math.cos(angle - 0.38), ty - L * Math.sin(angle - 0.38));
                    ctx.moveTo(tx, ty);
                    ctx.lineTo(tx - L * Math.cos(angle + 0.38), ty - L * Math.sin(angle + 0.38));
                };
                ctx.beginPath();
                ctx.strokeStyle = '#00aa44';
                ctx.lineWidth = 1.5;
                ctx.moveTo(cx, cy); ctx.lineTo(cx + a * s, cy - c * s);
                ctx.moveTo(cx, cy); ctx.lineTo(cx + b * s, cy - d * s);
                drawArrow(cx + a * s, cy - c * s);
                drawArrow(cx + b * s, cy - d * s);
                ctx.stroke();

                // ── singular-state nullspace hint: dashed line at collapse ───
                if (isSingular) {
                    ctx.save();
                    ctx.setLineDash([3, 5]);
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(170,51,34,0.22)';
                    ctx.lineWidth = 1;
                    ctx.moveTo(0, cy); ctx.lineTo(w, cy);
                    ctx.stroke();
                    ctx.restore();
                }

                // ── origin dot ───────────────────────────────────────────────
                ctx.beginPath();
                ctx.fillStyle = isSingular ? '#aa3322' : '#409040';
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            function updateSVD() {
                const a = +$('svdA').value || 0,
                    b = +$('svdB').value || 0,
                    c = +$('svdC').value || 0,
                    d = +$('svdD').value || 0;
                const { sigma1, sigma2 } = svd(a, b, c, d);
                const isZero    = !a && !b && !c && !d;
                const rank      = isZero ? 0 : (Math.abs(sigma2) < 1e-6 ? 1 : 2);
                const isSingular = rank < 2 && !isZero;

                $('svdMatrixStr').innerHTML  = `⎡ ${a.toFixed(2)}  ${b.toFixed(2)} ⎤<br>⎣ ${c.toFixed(2)}  ${d.toFixed(2)} ⎦`;
                $('svdSingularStr').innerHTML = `σ₁ = ${sigma1.toFixed(3)}, σ₂ = ${sigma2.toFixed(3)}`;
                $('svdCondStr').innerHTML    = sigma2 < 1e-6 ? '∞' : (sigma1 / sigma2).toFixed(3);
                $('svdRankStr').innerHTML    = rank === 0 ? '0 (zero matrix)' : rank === 1 ? '1 (dimension lost)' : '2 (full)';
                $('svdRecoverStr').innerHTML = isSingular ? 'FALSE' : 'TRUE';
                // both classes defined in CSS — toggle both so the state is always explicit
                $('svdRecoverStr').classList.toggle('warning',   isSingular);
                $('svdRecoverStr').classList.toggle('highlight', !isSingular);

                const rewardEl = $('puzzleReward');
                if (isSingular && rewardEl) {
                    rewardEl.style.display = 'block';
                    rewardEl.innerHTML = `> DETERMINANT ZERO. a dimension is gone.<br>> information cannot be reconstructed. welcome to the left nullspace.<br>
            <a href="https://xkcd.com/184/" target="_blank" rel="noopener" style="display:block;margin:12px 0;text-align:center;background:rgba(0,0,0,0.3);padding:8px;border:1px solid #2a5a2a;border-radius:2px;">
              <img src="https://imgs.xkcd.com/comics/matrix_transform.png" alt="xkcd 184: Matrix Transform" style="max-width:100%;height:auto;opacity:0.85;" loading="lazy">
            </a>
            <div style="font-style:italic;margin-top:8px;color:#80c080;">Rotation preserves area. The transpose is the inverse. The professor shrinks anyway. Singular matrices live in that gap.<br>Kurzweil predicted the Singularity by 2045. This one arrives when σ₂ = 0.</div>
            <div style="font-size:11px;text-align:center;margin-top:10px;color:#507050;">> [ ▒ permanently deleted from the DOM ]</div>`;
                    markSolved();
                } else if (rewardEl) {
                    rewardEl.style.display = 'none';
                }

                const canvas = $('svdCanvas');
                if (!canvas) return;
                const w = canvas.clientWidth, h = canvas.clientHeight;
                // guard: canvas not yet visible (display:none parent) — ResizeObserver will re-fire
                if (w === 0 || h === 0) return;
                const dpr = window.devicePixelRatio || 1;
                canvas.width  = w * dpr;
                canvas.height = h * dpr;
                const ctx = canvas.getContext('2d');
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                drawSVD(ctx, w, h, a, b, c, d, isSingular);
            }

            function setupField(id) {
                const inp = $(id);
                if (!inp) return;
                inp.addEventListener('input', updateSVD);
                inp.addEventListener('keydown', e => {
                    const step = e.shiftKey ? 0.1 : 1;
                    if (e.key === 'ArrowUp') { e.preventDefault();
                        inp.value = ((+inp.value) + step).toFixed(e.shiftKey ? 1 : 0);
                        updateSVD(); } else if (e.key === 'ArrowDown') { e.preventDefault();
                        inp.value = ((+inp.value) - step).toFixed(e.shiftKey ? 1 : 0);
                        updateSVD(); } else if (e.key === 'r' && !e.ctrlKey && !e.metaKey) { e.preventDefault();
                        $('svdA').value = 1;
                        $('svdB').value = 0;
                        $('svdC').value = 0;
                        $('svdD').value = 1;
                        updateSVD(); }
                });
            }

            function renderPuzzle() {
                const el = $('page-puzzle');
                if (!el) return;
                el.innerHTML = `<div class="terminal-puzzle">
            <h3>strang's svd · dimensional collapse</h3>
            <div class="lede">every linear map <b>A</b> can be written <b>A = UΣVᵀ</b>. the singular values σ₁ and σ₂ are the amounts of stretch along the two principal directions. when one of them drifts toward zero, the map is folding the plane onto a line — and that\'s a move it can\'t straightforwardly undo.</div>
            <div class="puzzle-math">⎡ a  b ⎤   ⎡ σ₁   0 ⎤   ⎡ — v₁ᵀ — ⎤<br>⎣ c  d ⎦ = ⎣  0  σ₂ ⎦ · ⎣ — v₂ᵀ — ⎦</div>
            <canvas class="matrix-stage" id="svdCanvas"></canvas>
            <div class="puzzle-readout">
              <div><span class="k">system matrix A</span></div><div class="v" id="svdMatrixStr">⎡ 2.00  0 ⎤<br>⎣ 0   1.00 ⎦</div>
              <div><span class="k">singular values σ</span></div><div class="v" id="svdSingularStr">σ₁ = 2.00, σ₂ = 1.00</div>
              <div><span class="k">condition number</span></div><div class="v" id="svdCondStr">2.00</div>
              <div><span class="k">rank</span></div><div class="v" id="svdRankStr">2 (full)</div>
              <div><span class="k">recoverability</span></div><div class="v highlight" id="svdRecoverStr">TRUE</div>
            </div>
            <div class="puzzle-input-group">
              <label for="svdA">a</label><input type="number" id="svdA" class="matrix-input" step="1" value="2" autocomplete="off" aria-label="Matrix a">
              <label for="svdB">b</label><input type="number" id="svdB" class="matrix-input" step="1" value="0" autocomplete="off" aria-label="Matrix b">
              <label for="svdC">c</label><input type="number" id="svdC" class="matrix-input" step="1" value="0" autocomplete="off" aria-label="Matrix c">
              <label for="svdD">d</label><input type="number" id="svdD" class="matrix-input" step="1" value="1" autocomplete="off" aria-label="Matrix d">
              <button class="btn" id="svdReset">identity</button>
            </div>
            <div class="kbd-hints"><span><kbd>Tab</kbd> next</span><span><kbd>↑↓</kbd> ±1</span><span><kbd>Shift</kbd>+<kbd>↑↓</kbd> ±0.1</span><span><kbd>r</kbd> reset</span></div>
            <div id="puzzleReward" class="puzzle-reward"></div>
            <div class="puzzle-math">as σ₂ → 0 the condition number blows up, the matrix stops being invertible, and one direction\'s worth of information has nowhere to go.</div>
          </div>`;
                ['svdA', 'svdB', 'svdC', 'svdD'].forEach(setupField);
                $('svdReset').addEventListener('click', () => { $('svdA').value = 1;
                    $('svdB').value = 0;
                    $('svdC').value = 0;
                    $('svdD').value = 1;
                    updateSVD(); });
                updateSVD();
                const canvas = $('svdCanvas');
                if (canvas) {
                    disconnectObserver();
                    ensureObserver(canvas);
                }
            }

            // ---------- BUG PUZZLES ----------
            const bugPuzzles = {
                prob: { id: 'prob', title: 'probability glitch', question: 'you flip two fair coins. i tell you at least one is heads. what is the probability both are heads? (enter as fraction, e.g., 1/3)', placeholder: 'x/y', answer: '1/3' },
                eigen: { id: 'eigen', title: 'linear algebra artifact', question: 'what are the eigenvalues of the matrix [[2,1],[1,2]]? (enter two numbers separated by a comma, e.g., 1,3)', placeholder: 'λ1,λ2', answer: '1,3' },
                grad: { id: 'grad', title: 'gradient descent step', question: 'given f(x) = x², start at x = 2, learning rate η = 0.25. what is x after one gradient descent step? (f\'(x) = 2x)', placeholder: 'number', answer: '1' }
            };

            function openBugModal(puzzle) {
                const modal = $('puzzleModal'),
                    body = $('modalBody');
                body.innerHTML =
                    `<p><strong>${esc(puzzle.title)}</strong></p><p>${esc(puzzle.question)}</p>
            <input type="text" id="bugAnswer" class="puzzle-modal-input" placeholder="${esc(puzzle.placeholder||'')}" aria-label="Your answer">
            <button id="bugSubmit" class="puzzle-modal-btn">submit</button>
            <div id="bugFeedback" style="margin-top:6px;font-size:12px;color:var(--accent);"></div>`;
                modal.classList.add('active');
                const submit = $('bugSubmit'),
                    input = $('bugAnswer'),
                    feedback = $('bugFeedback');
                // Focus input
                setTimeout(() => input.focus(), 50);
                // normalise before comparing: trim whitespace, sort comma-separated
                // values so eigenvalue answers like "3,1" and "1,3" are both accepted
                const normalise = s => s.split(',').map(v => v.trim()).sort().join(',');
                const handler = () => {
                    const ans = normalise(input.value.trim().toLowerCase());
                    if (ans === normalise(puzzle.answer)) {
                        feedback.textContent = 'resolved.';
                        markBugSolved(puzzle.id);
                        const bugEl = document.querySelector(`.bug-pixel[data-bug-id="${puzzle.id}"]`);
                        if (bugEl) bugEl.remove();
                        setTimeout(() => modal.classList.remove('active'), 500);
                    } else { feedback.textContent = 'incorrect.'; }
                };
                submit.addEventListener('click', handler);
                input.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
            }

            function closeModal() { $('puzzleModal').classList.remove('active'); }
            $('modalClose').addEventListener('click', closeModal);
            $('puzzleModal').addEventListener('click', e => { if (e.target === $('puzzleModal')) closeModal(); });
            // ESC key to close modal (FIXED)
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && $('puzzleModal').classList.contains('active')) {
                    closeModal();
                }
            });

            function injectBugs() {
                // artifacts appear after the feed on each page — no title attribute,
                // no aria description; discovery is the mechanism.
                const notesPage = $('page-notes');
                if (notesPage && !tinyBugsSolved['prob']) {
                    const bug = document.createElement('span');
                    bug.className = 'bug-pixel';
                    bug.dataset.bugId = 'prob';
                    bug.textContent = '▣';
                    bug.setAttribute('aria-label', 'rendering artifact');
                    bug.addEventListener('click', () => openBugModal(bugPuzzles.prob));
                    const feed = notesPage.querySelector('.feed');
                    if (feed) feed.after(bug);
                }
                const researchPage = $('page-research');
                if (researchPage && !tinyBugsSolved['eigen']) {
                    const bug = document.createElement('span');
                    bug.className = 'bug-pixel';
                    bug.dataset.bugId = 'eigen';
                    bug.textContent = '▣';
                    bug.setAttribute('aria-label', 'rendering artifact');
                    bug.addEventListener('click', () => openBugModal(bugPuzzles.eigen));
                    const feed = researchPage.querySelector('.feed');
                    if (feed) feed.after(bug);
                }
                const essaysPage = $('page-essays');
                if (essaysPage && !tinyBugsSolved['grad']) {
                    const bug = document.createElement('span');
                    bug.className = 'bug-pixel';
                    bug.dataset.bugId = 'grad';
                    bug.textContent = '▣';
                    bug.setAttribute('aria-label', 'rendering artifact');
                    bug.addEventListener('click', () => openBugModal(bugPuzzles.grad));
                    const feed = essaysPage.querySelector('.feed');
                    if (feed) feed.after(bug);
                }
            }

            // ---------- RENDERERS ----------
            function renderLibrary() {
                const el = $('page-library');
                if (!el) return;
                const cats = [...new Set(books.map(b => b.cat))];
                let html = '';
                cats.forEach(cat => {
                    html += `<div class="lib-category">${esc(cat)}</div>`;
                    books.filter(b => b.cat === cat).forEach(b => html +=
                        `<div class="book-entry"><div class="book-title-row"><span>${esc(b.title)}</span><span class="book-author">${esc(b.author)}</span></div><div class="book-thoughts">${esc(b.thoughts)}</div></div>`
                        );
                });
                el.innerHTML = html + `<p class="promptline">${esc(pages.library.prompt)}</p>`;
                el.addEventListener('click', e => {
                    const entry = e.target.closest('.book-entry');
                    if (!entry) return;
                    entry.classList.toggle('open');
                });
            }

            function renderList(key) {
                const data = pages[key];
                const el = $('page-' + key);
                if (!el || !data.entries.length) return;
                const isLabel = key === 'tinkering';
                const rows = data.entries.map(([date, title, tag]) => {
                    const cell = isLabel ? `<span class="label">${esc(date)}</span>` :
                        `<time datetime="${esc(date)}">${esc(date)}</time>`;
                    return `<div class="row${isLabel ? ' lib' : ''}">${cell}<span class="title">${esc(title)}</span><span class="tag">[${esc(tag)}]</span></div>`;
                }).join('');
                el.innerHTML = `<div class="feed">${rows}</div><p class="promptline">${esc(data.prompt)}</p>`;
            }

            // ─────────────────────────────────────────────────────────────
            // the sign terminal takes equations.
            // a few of them, it answers back.
            // σ₁ · σ₂ = |det(A)| is one of those.
            // ─────────────────────────────────────────────────────────────
            const SECRET_CMDS = {
                'det(a)=0'          : '> det(A) = 0. the null space opens. one direction is gone.',
                'det(a) = 0'        : '> det(A) = 0. the null space opens. one direction is gone.',
                'σ₁·σ₂=|det(a)|'   : '> σ₁ · σ₂ = |det(A)|. you read the source.',
                'σ₁·σ₂ = |det(a)|' : '> σ₁ · σ₂ = |det(A)|. you read the source.',
                'source'            : '> the structure is part of the argument. reading it counts.',
                'e^(iπ)+1=0'        : '> euler. yes.',
                'e^(iπ) + 1 = 0'   : '> euler. yes.',
            };

            function renderSign() {
                const el = $('page-sign');
                if (!el) return;
                const equations = safeGetJSON(SIGN_KEY, []);
                const log = equations.map(e => `<li>> ${esc(e)}</li>`).join('');
                el.innerHTML = `<div class="terminal-sign"><h3>sign in space</h3>
            <div class="terminal-prompt"><span>></span><input id="termInput" class="terminal-input" placeholder="enter an equation..." aria-label="Enter equation" autocomplete="off" spellcheck="false"></div>
            <ul class="terminal-log" id="termLog">${log}</ul></div>
            <p class="promptline">${esc(pages.sign.prompt)}</p>`;
                const input = $('termInput'),
                    logEl = $('termLog');
                // scroll to bottom on load so prior history is visible
                logEl.scrollTop = logEl.scrollHeight;
                input.addEventListener('keydown', e => {
                    if (e.key !== 'Enter') return;
                    const val = input.value.trim();
                    if (!val) return;
                    input.value = '';
                    const cmd = val.toLowerCase();
                    // check for secret commands first — they are not persisted to the log
                    if (SECRET_CMDS[cmd]) {
                        const li = document.createElement('li');
                        li.textContent = SECRET_CMDS[cmd];
                        li.style.color = '#a0ffa0';
                        logEl.appendChild(li);
                        logEl.scrollTop = logEl.scrollHeight;
                        if (!sourcePuzzleSolved) {
                            sourcePuzzleSolved = true;
                            safeSet(SOURCE_KEY, 'true');
                        }
                        return;
                    }
                    equations.push(val);
                    safeSetJSON(SIGN_KEY, equations);
                    const li = document.createElement('li');
                    li.textContent = '> ' + val;
                    logEl.appendChild(li);
                    logEl.scrollTop = logEl.scrollHeight;
                });
                setTimeout(() => input.focus(), 100);
            }

            // Initial render
            navOrder.forEach(key => { if (key === 'library') renderLibrary();
                else if (key === 'sign') renderSign();
                else if (key !== 'puzzle') renderList(key); });
            renderPuzzle();
            injectBugs();

            // ---------- TRANSITIONS ----------
            let isTransitioning = false,
                currentKey = null; // null forces swapPageContent to run fully on first call

            function swapPageContent(key, fromNav) {
                if (!pages[key]) key = 'notes';
                if (key === currentKey && !fromNav) return;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const ap = $('page-' + key);
                if (ap) ap.classList.add('active');
                nav.querySelectorAll('a').forEach(a => {
                    const m = a.dataset.page === key;
                    a.classList.toggle('active', m);
                    if (m) a.setAttribute('aria-current', 'page');
                    else a.removeAttribute('aria-current');
                });
                winTitle.textContent = pages[key].winTitle;
                document.title = pages[key].winTitle;
                statusLeft.textContent = pages[key].label;
                const n = pages[key].entries ? pages[key].entries.length : (key === 'library' ? books.length : 0);
                statusRight.textContent = n > 0 ? `${n} item${n > 1 ? 's' : ''}` : 'ready';
                if (bodyEl) bodyEl.scrollTop = 0;
                startTypewriter(pages[key].words);
                currentKey = key;
                if (!fromNav) history.replaceState(null, '', '#' + key);
                if (key === 'puzzle') {
                    const canvas = $('svdCanvas');
                    if (canvas) ensureObserver(canvas);
                } else {
                    disconnectObserver();
                }
            }

            function transitionToPage(key) {
                if (isTransitioning) return;
                isTransitioning = true;
                playCrtPop();
                if (crtScreen) {
                    crtScreen.classList.add('crt-shutdown');
                    setTimeout(() => {
                        swapPageContent(key, true);
                        crtScreen.classList.remove('crt-shutdown');
                        crtScreen.classList.add('crt-startup');
                        setTimeout(() => { crtScreen.classList.remove('crt-startup');
                            isTransitioning = false; }, 400);
                    }, 70);
                } else { swapPageContent(key, true);
                    isTransitioning = false; }
            }
            nav.addEventListener('click', e => {
                const a = e.target.closest('a[data-page]');
                if (!a) return;
                e.preventDefault();
                transitionToPage(a.dataset.page);
            });
            window.addEventListener('hashchange', () => {
                const k = location.hash.replace('#', '');
                if (k && k !== currentKey && pages[k]) transitionToPage(k);
            });

            // ---------- GLITCH PIXEL ----------
            const glitchBtn = $('glitch');

            function moveGlitch() {
                if (!glitchBtn || !glitchBtn.isConnected || puzzleSolved) return;
                const pad = 28;
                const maxX = Math.max(0, window.innerWidth - 76);
                const maxY = Math.max(0, window.innerHeight - 76);
                glitchBtn.style.left = Math.min(pad + Math.random() * maxX, maxX) + 'px';
                glitchBtn.style.top = Math.min(pad + Math.random() * maxY, maxY) + 'px';
            }
            if (glitchBtn) {
                if (puzzleSolved) glitchBtn.remove();
                else {
                    // irregular interval: the machine does not keep a schedule
                    (function scheduleGlitch() {
                        moveGlitch();
                        glitchInterval = setTimeout(scheduleGlitch, 3200 + Math.random() * 6400);
                    })();
                    window.addEventListener('resize', moveGlitch);
                    glitchBtn.addEventListener('click', () => transitionToPage('puzzle'));
                }
            }

            // ---------- CLOCK ----------
            function tickClock() {
                const d = new Date();
                const h12 = ((d.getHours() + 11) % 12) + 1;
                clockEl.textContent = `${h12}:${String(d.getMinutes()).padStart(2, '0')} ${d.getHours() >= 12 ? 'PM' : 'AM'}`;
            }
            tickClock();
            setInterval(tickClock, 1000);
            // restore after tab-switch without waiting up to a full second
            document.addEventListener('visibilitychange', () => { if (!document.hidden) tickClock(); });

            // ---------- INIT ----------
            const initial = location.hash.replace('#', '') || 'notes';
            swapPageContent(initial);
        })();
    </script>
</body>
</html>
